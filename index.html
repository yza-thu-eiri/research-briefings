<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Research Briefings Console</title>
<style>
:root {
  color-scheme: light;
  --bg: #eef5f7;
  --panel: rgba(255, 255, 255, .88);
  --panel-2: rgba(247, 252, 253, .96);
  --ink: #12252b;
  --muted: #62777d;
  --line: rgba(37, 91, 102, .18);
  --line-strong: rgba(22, 110, 128, .38);
  --cyan: #0089a7;
  --blue: #3f7bd9;
  --amber: #d89a17;
  --skip: #8aa3ad;
  --queue: #4b83d1;
  --reading: #00a6a6;
  --pass: #d89a17;
  --read: #1c9a63;
  --important: #8f4fe8;
  --green: #1c9a63;
  --violet: #8f4fe8;
  --slate: #90a4ae;
  --topic-mon: #0089a7;
  --topic-tue: #7b61d1;
  --topic-wed: #1c9a63;
  --topic-thu: #d89a17;
  --topic-fri: #c4558b;
  --topic-sat: #4b83d1;
  --topic-sun: #90a4ae;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  min-height: 100vh;
  background:
    linear-gradient(rgba(0, 137, 167, .06) 1px, transparent 1px) 0 0 / 30px 30px,
    linear-gradient(90deg, rgba(0, 137, 167, .045) 1px, transparent 1px) 0 0 / 30px 30px,
    linear-gradient(180deg, #eef5f7 0%, #f8fbfc 42%, #ffffff 100%);
  color: var(--ink);
  font-family: "Bahnschrift", "DIN Condensed", "Microsoft YaHei", "PingFang SC", sans-serif;
}
body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background: linear-gradient(120deg, rgba(0,137,167,.12), transparent 34%, rgba(63,123,217,.1));
  mask-image: linear-gradient(180deg, rgba(255,255,255,.72), rgba(255,255,255,0));
}
button, input, textarea { font: inherit; }
button { color: inherit; }
a { color: inherit; }
.shell { max-width: 1440px; margin: 0 auto; padding: 28px 22px 48px; position: relative; }
.topbar {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 22px;
  align-items: end;
  padding: 18px 0 22px;
  border-bottom: 1px solid var(--line-strong);
}
.kicker { color: var(--cyan); font-size: 13px; letter-spacing: .08em; text-transform: uppercase; }
h1 { margin: 6px 0 0; font-size: clamp(34px, 6vw, 78px); line-height: .9; letter-spacing: 0; }
.hud { text-align: right; color: var(--muted); font-size: 13px; line-height: 1.65; }
.global-readout { color: var(--ink); font-size: 20px; font-variant-numeric: tabular-nums; }
.toolbar {
  display: grid;
  grid-template-columns: minmax(240px, 1fr) auto;
  gap: 12px;
  margin: 18px 0;
  align-items: center;
}
.timeline-panel {
  border: 1px solid var(--line);
  border-radius: 8px;
  background: linear-gradient(180deg, rgba(255,255,255,.9), rgba(247,252,253,.74));
  padding: 12px;
  margin: 0 0 18px;
  box-shadow: 0 12px 32px rgba(31,72,84,.06);
}
.timeline-head {
  display: flex;
  align-items: start;
  justify-content: space-between;
  gap: 14px;
  margin-bottom: 10px;
}
.timeline-title { font-size: 18px; font-weight: 900; }
.timeline-subtitle { color: var(--muted); font-size: 12px; margin-top: 3px; }
.weekboard {
  display: grid;
  grid-template-columns: repeat(7, minmax(0, 1fr));
  gap: 7px;
  margin: 0 0 8px;
}
.week-card {
  --topic-color: var(--cyan);
  border: 1px solid var(--line);
  border-radius: 7px;
  background: rgba(255,255,255,.82);
  padding: 9px;
  text-align: left;
  cursor: pointer;
  min-height: 98px;
}
.week-card:hover, .week-card.filtered { border-color: var(--topic-color); background: #f4fbfd; }
.week-card.filtered { box-shadow: 0 0 0 3px color-mix(in srgb, var(--topic-color) 18%, transparent); }
.week-card.today-topic {
  border-color: var(--topic-color);
  background:
    linear-gradient(180deg, color-mix(in srgb, var(--topic-color) 10%, #fff), rgba(255,255,255,.84));
  box-shadow: inset 0 3px 0 var(--topic-color), 0 0 0 3px color-mix(in srgb, var(--topic-color) 12%, transparent);
}
.week-card.empty { opacity: .72; }
.week-day { color: var(--topic-color); font-size: 12px; font-weight: 800; text-transform: uppercase; }
.week-topic { margin-top: 6px; font-weight: 800; line-height: 1.2; }
.week-meta { margin-top: 8px; color: var(--muted); font-size: 12px; line-height: 1.45; }
.topic-meter {
  height: 8px;
  border-radius: 999px;
  border: 1px solid rgba(18,37,43,.12);
  background: #e6eef0;
  overflow: hidden;
  margin-top: 10px;
}
.topic-meter span {
  display: block;
  height: 100%;
  width: var(--meter-pct, 0%);
  background: var(--topic-color);
}
.topic-stats {
  display: grid;
  grid-template-columns: 1fr;
  gap: 4px;
  margin-top: 8px;
  color: var(--muted);
  font-size: 12px;
}
.topic-stats b { color: var(--ink); }
.topic-compact-line {
  color: var(--ink);
  font-weight: 900;
}
.topic-archive-line {
  color: var(--muted);
  font-weight: 800;
}
.topic-star {
  color: var(--important);
}
.week-cells { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 9px; }
.week-cells .cell { width: 13px; height: 13px; }
.timeline-body {
  --timeline-body-height: 540px;
  display: grid;
  grid-template-columns: minmax(0, 3fr) minmax(280px, 1fr);
  gap: 12px;
  align-items: stretch;
}
.timeline-body.collapsed {
  display: block;
}
.timeline-calendar-column {
  min-width: 0;
  height: var(--timeline-body-height);
  display: flex;
  flex-direction: column;
}
.timeline-body.collapsed .timeline-calendar-column {
  height: auto;
}
.timeline-body.collapsed .calendar-panel,
.timeline-body.collapsed .contrib-panel {
  display: none;
}
.timeline-calendar-column .weekboard {
  flex: 0 0 auto;
}
.calendar-panel {
  padding: 0;
  margin: 0;
  height: auto;
  flex: 1;
  min-height: 0;
  overflow: auto;
}
.calendar-tools {
  display: flex;
  gap: 7px;
  align-items: center;
  flex-wrap: wrap;
  justify-content: flex-end;
}
.calendar-month-label {
  min-width: 92px;
  text-align: center;
  color: var(--ink);
  font-weight: 900;
}
.calendar-title {
  font-size: 18px;
  font-weight: 900;
  letter-spacing: 0;
}
.calendar-toggle {
  border: 1px solid var(--line-strong);
  background: #fff;
  border-radius: 7px;
  padding: 8px 11px;
  font-weight: 800;
  cursor: pointer;
  white-space: nowrap;
}
.calendar-nav {
  width: 34px;
  min-height: 34px;
  border: 1px solid var(--line);
  border-radius: 7px;
  background: #fff;
  cursor: pointer;
  font-weight: 900;
}
.calendar-strip {
  display: grid;
  grid-template-columns: repeat(7, minmax(0, 1fr));
  gap: 7px;
  padding: 0;
}
.calendar-day {
  --topic-color: var(--cyan);
  --day-bg: #ffffff;
  --day-border: var(--line);
  min-width: 0;
  min-height: 46px;
  border: 1px solid var(--day-border);
  border-radius: 6px;
  background: var(--day-bg);
  padding: 6px;
  text-align: left;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.calendar-day.outside { opacity: .46; }
.calendar-day.month-visible {
  opacity: 1;
}
.calendar-day.month-visible .calendar-date {
  font-weight: 950;
}
.calendar-day.empty {
  cursor: default;
  color: var(--muted);
  background: var(--day-bg);
}
.calendar-day.weekday { --day-bg: #ffffff; --day-border: rgba(37,91,102,.18); }
.calendar-day.weekend,
.calendar-day.holiday { --day-bg: #eaf8ef; --day-border: rgba(28,154,99,.24); }
.calendar-day.workday {
  --day-bg: #fff0d8;
  --day-border: rgba(216,154,23,.64);
}
.calendar-day.today {
  border-color: var(--topic-color);
  box-shadow:
    inset 0 0 0 2px color-mix(in srgb, var(--topic-color) 45%, transparent),
    0 0 0 3px color-mix(in srgb, var(--topic-color) 14%, transparent);
}
.calendar-day.today::after {
  content: "TODAY";
  position: absolute;
  right: 6px;
  bottom: 5px;
  color: var(--topic-color);
  font-size: 8px;
  font-weight: 900;
  letter-spacing: .06em;
  z-index: 0;
  opacity: .82;
}
.calendar-day.linked {
  outline: 2px dashed color-mix(in srgb, var(--topic-color) 64%, transparent);
  outline-offset: 2px;
}
.calendar-panel.collapsed .calendar-day {
  min-height: 42px;
  padding: 6px;
  gap: 3px;
}
.calendar-day:hover, .calendar-day.active {
  border-color: var(--topic-color);
  background: color-mix(in srgb, var(--day-bg) 88%, var(--topic-color) 12%);
}
.calendar-day > * { position: relative; z-index: 1; }
.calendar-date {
  width: 100%;
  display: flex;
  justify-content: space-between;
  gap: 3px;
  color: var(--ink);
  font-size: 11px;
  font-weight: 900;
  font-variant-numeric: tabular-nums;
}
.calendar-date small { color: var(--muted); font-size: 10px; font-weight: 800; }
.calendar-badge {
  width: 16px;
  height: 16px;
  flex: 0 0 16px;
  box-sizing: border-box;
  border-radius: 999px;
  display: grid;
  place-items: center;
  font-size: 10px;
  line-height: 1;
  font-weight: 900;
  background: #fff;
  border: 2px solid currentColor;
  box-shadow: 0 0 0 2px color-mix(in srgb, currentColor 8%, transparent);
}
.calendar-badge span {
  display: block;
  line-height: 1;
  width: 8px;
  height: 8px;
  position: relative;
}
.calendar-panel.collapsed .calendar-badge {
  width: 16px;
  height: 16px;
  font-size: 9px;
}
.calendar-badge.lv0 {
  color: #90a4ae;
  background: linear-gradient(180deg, #ffffff, #edf5f7);
  border-style: dashed;
}
.calendar-badge.lv1 {
  background: linear-gradient(180deg, #ffffff, #eef5ff);
}
.calendar-badge.lv1 span::before {
  content: "";
  position: absolute;
  inset: 2px;
  border-radius: 999px;
  background: currentColor;
}
.calendar-badge.lv2 {
  background: radial-gradient(circle at 50% 50%, color-mix(in srgb, currentColor 14%, #fff) 0 34%, #fff 36% 100%);
}
.calendar-badge.lv2 span::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 999px;
  background: linear-gradient(90deg, transparent 0 44%, currentColor 45% 100%);
}
.calendar-badge.lv3 {
  background: radial-gradient(circle at 50% 50%, currentColor 0 32%, #fff 34% 100%);
  color: #1c9a63;
}
.calendar-badge.lv3 span::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 999px;
  background: currentColor;
}
.calendar-badge.lv4 {
  color: #6b63ff;
  border-width: 2px;
  background:
    radial-gradient(circle at 50% 48%, #fff 0 32%, rgba(107,99,255,.18) 34% 100%),
    linear-gradient(135deg, rgba(107,99,255,.26), rgba(216,154,23,.18));
  box-shadow: 0 0 0 2px rgba(107,99,255,.12), 0 0 10px rgba(107,99,255,.2);
}
.calendar-badge.lv4 span::before {
  content: "";
  position: absolute;
  inset: 1px;
  border-radius: 2px;
  background: currentColor;
  transform: rotate(45deg);
}
.calendar-badge.lv5 {
  color: #8f4fe8;
  border-width: 2px;
  background:
    radial-gradient(circle at 50% 45%, #fff 0 32%, rgba(216,154,23,.2) 33% 48%, rgba(143,79,232,.18) 50% 100%),
    linear-gradient(135deg, rgba(143,79,232,.24), rgba(0,166,166,.16));
  box-shadow: 0 0 0 2px rgba(143,79,232,.16), 0 0 14px rgba(143,79,232,.36), 0 0 8px rgba(216,154,23,.22) inset;
  transform: rotate(45deg);
}
.calendar-badge.lv5 span { transform: rotate(-45deg); }
.calendar-badge.lv5 span::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 2px;
  background: currentColor;
  transform: rotate(45deg);
  box-shadow: 0 0 0 2px rgba(216,154,23,.2);
}
.calendar-level {
  color: var(--muted);
  font-size: 9px;
  line-height: 16px;
  font-weight: 900;
  text-transform: uppercase;
}
.calendar-status-row {
  display: flex;
  align-items: center;
  gap: 4px;
  margin-top: 1px;
}
.calendar-main,
.calendar-bonus-row {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 6px;
  color: var(--muted);
  font-size: 11px;
  font-weight: 800;
}
.calendar-main b,
.calendar-bonus-row b { color: var(--ink); }
.calendar-read-dots {
  display: block;
  width: 100%;
  height: 2px;
  border-radius: 999px;
  background: linear-gradient(90deg, var(--topic-color) var(--day-fill, 0%), #dce9ec 0);
  margin-top: auto;
}
.calendar-bonus,
.calendar-read-dots span {
  display: none;
}
.calendar-important-stars {
  position: static;
  display: flex;
  gap: 2px;
  align-items: center;
  margin-left: auto;
  flex: 0 0 auto;
}
.calendar-important-stars span {
  width: 8px;
  height: 8px;
  background: var(--important);
  clip-path: polygon(50% 0, 61% 35%, 98% 35%, 68% 57%, 79% 92%, 50% 70%, 21% 92%, 32% 57%, 2% 35%, 39% 35%);
}
.calendar-important-stars b {
  color: var(--important);
  font-size: 9px;
  line-height: 1;
}
.calendar-tag {
  display: none;
}
.calendar-empty-mark {
  color: #90a4ae;
  font-size: 9px;
  font-weight: 900;
}
.contrib-panel {
  margin-top: 0;
  border-top: 0;
  border-left: 1px solid var(--line);
  padding: 0 0 0 12px;
  height: var(--timeline-body-height);
  display: flex;
  flex-direction: column;
  min-height: 0;
}
.contrib-head {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 12px;
  margin-bottom: 8px;
}
.contrib-title { font-size: 15px; font-weight: 900; }
.contrib-subtitle { color: var(--muted); font-size: 12px; margin-top: 3px; }
.contrib-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}
.contrib-day {
  width: 18px;
  height: 18px;
  min-height: 0;
  border: 1px solid rgba(18,37,43,.08);
  border-radius: 3px;
  background: var(--heat);
  cursor: pointer;
  position: relative;
}
.contrib-day.active {
  border-color: var(--cyan);
  box-shadow: 0 0 0 3px rgba(0,137,167,.14);
}
.contrib-day span {
  display: none;
}
.contrib-detail {
  margin-top: 8px;
  border-top: 0;
  padding-top: 0;
  display: grid;
  grid-template-columns: 1fr;
  gap: 10px;
  min-height: 0;
  flex: 1;
}
.contrib-kpis {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 7px;
}
.contrib-kpi {
  border: 1px solid var(--line);
  border-radius: 7px;
  padding: 6px 7px;
  background: #fff;
  color: var(--muted);
  font-size: 11px;
  font-weight: 800;
}
.contrib-kpi b { display: block; color: var(--ink); font-size: 16px; }
.contrib-list {
  display: grid;
  gap: 6px;
  max-height: none;
  overflow: auto;
  min-height: 0;
}
.contrib-item {
  display: grid;
  grid-template-columns: 42px minmax(0, 1fr) auto;
  gap: 6px;
  align-items: center;
  border: 1px solid var(--line);
  border-radius: 7px;
  background: #fff;
  padding: 6px 7px;
  font-size: 11px;
}
.contrib-item .source { color: var(--cyan); font-weight: 900; }
.contrib-item .paper { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.contrib-item .decision {
  justify-self: end;
  border-radius: 999px;
  padding: 2px 6px;
  background: color-mix(in srgb, var(--decision-color) 16%, #fff);
  color: var(--decision-color);
  font-weight: 900;
  white-space: nowrap;
}
.topic-rail {
  width: 7px;
  align-self: stretch;
  border-radius: 999px;
  background: var(--topic-color);
}
.search, .textarea-input {
  width: 100%;
  border: 1px solid var(--line);
  background: rgba(255, 255, 255, .86);
  color: var(--ink);
  border-radius: 6px;
  padding: 11px 13px;
  outline: none;
}
.search:focus, .textarea-input:focus { border-color: var(--cyan); box-shadow: 0 0 0 3px rgba(0,137,167,.12); }
.seg { display: inline-flex; border: 1px solid var(--line); border-radius: 6px; overflow: hidden; background: rgba(255,255,255,.76); }
.seg button, .ghost-btn, .action-btn, .mode-btn {
  border: 0;
  background: transparent;
  cursor: pointer;
  white-space: nowrap;
}
.seg button { padding: 10px 13px; color: var(--muted); }
.seg button.active { background: var(--cyan); color: #fff; }
.layout { display: grid; grid-template-columns: minmax(420px, 1fr) minmax(460px, 620px); gap: 18px; align-items: start; }
.overview {
  display: grid;
  gap: 10px;
}
.briefing-row {
  --topic-color: var(--cyan);
  width: 100%;
  display: grid;
  grid-template-columns: 7px 92px 112px minmax(160px, 1fr) auto;
  gap: 14px;
  align-items: center;
  border: 1px solid var(--line);
  background: linear-gradient(90deg, rgba(255, 255, 255, .96), rgba(241, 249, 252, .86));
  border-radius: 7px;
  padding: 12px;
  text-align: left;
  cursor: pointer;
  transition: border-color .16s ease, transform .16s ease, background .16s ease;
}
.briefing-row:hover, .briefing-row.active {
  border-color: var(--cyan);
  transform: translateY(-1px);
  background: linear-gradient(90deg, rgba(246, 253, 255, .98), rgba(232, 246, 251, .9));
}
.date { color: var(--topic-color); font-variant-numeric: tabular-nums; font-weight: 700; }
.topic { min-width: 0; }
.topic-name { font-weight: 700; line-height: 1.3; }
.topic-kicker { color: var(--muted); font-size: 13px; margin-top: 6px; line-height: 1.35; }
.row-sub { color: var(--muted); font-size: 12px; margin-top: 5px; }
.level-badge {
  display: grid;
  justify-items: center;
  gap: 4px;
}
.level-ring {
  width: calc(64px + var(--level-boost, 0px));
  height: calc(64px + var(--level-boost, 0px));
  border-radius: 999px;
  display: grid;
  place-items: center;
  background:
    conic-gradient(var(--level-color) calc(var(--pct) * 1%), #dbe8eb 0);
  box-shadow: inset 0 0 0 1px rgba(18,37,43,.08);
}
.level-ring::before {
  content: "";
  position: absolute;
}
.level-inner {
  width: calc(48px + var(--level-boost, 0px) * .65);
  height: calc(48px + var(--level-boost, 0px) * .65);
  border-radius: 999px;
  display: grid;
  place-items: center;
  background: #fff;
  color: var(--level-color);
  font-weight: 900;
  font-size: 22px;
}
.level-name { font-size: 12px; color: var(--muted); font-weight: 800; }
.bonus-dots {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 3px;
  max-width: 92px;
}
.bonus-dot {
  width: 7px;
  height: 7px;
  border-radius: 999px;
  background: var(--dot-color, var(--important));
  box-shadow: 0 0 0 1px rgba(255,255,255,.9), 0 0 8px color-mix(in srgb, var(--dot-color, var(--important)) 38%, transparent);
}
.stat-grid {
  display: grid;
  grid-template-columns: repeat(4, auto);
  gap: 8px 12px;
  color: var(--muted);
  font-size: 12px;
  margin-top: 8px;
}
.stat-grid b { color: var(--ink); font-variant-numeric: tabular-nums; }
.match-list {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin-top: 7px;
}
.match-chip {
  max-width: 100%;
  border: 1px solid color-mix(in srgb, var(--topic-color) 30%, transparent);
  border-radius: 999px;
  background: color-mix(in srgb, var(--topic-color) 8%, white);
  color: var(--ink);
  padding: 3px 7px;
  font-size: 11px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.cells { display: flex; gap: 5px; flex-wrap: wrap; justify-content: flex-end; max-width: 360px; }
.cell {
  width: 18px;
  height: 18px;
  border-radius: 3px;
  border: 1px solid rgba(18,37,43,.14);
  background: rgba(255,255,255,.76);
  position: relative;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,.58);
}
.cell.queue {
  background: repeating-linear-gradient(135deg, rgba(75,131,209,.18) 0 4px, rgba(75,131,209,.62) 4px 8px);
  border-color: var(--queue);
}
.cell.reading {
  background: repeating-linear-gradient(135deg, rgba(0,166,166,.2) 0 4px, rgba(0,166,166,.68) 4px 8px);
  border-color: var(--reading);
}
.cell.skip { background: var(--skip); }
.cell.pass { background: var(--pass); }

  const dates = BRIEFINGS.map(b => b.date).filter(Boolean).sort();
  const records = contributionRecords().map(item => item.day).sort();
  const start = dates[0] || records[0] || dateKey(new Date());
  const end = records[records.length - 1] || dates[dates.length - 1] || dateKey(new Date());
  const startDate = parseDateKey(start);
  startDate.setDate(startDate.getDate() - ((startDate.getDay() + 6) % 7));
  const endDate = parseDateKey(end);
  endDate.setDate(endDate.getDate() + (6 - ((endDate.getDay() + 6) % 7)));
  const days = [];
  for (let cursor = startDate; cursor <= endDate; cursor = addDays(cursor, 1)) days.push(dateKey(cursor));
  return days;
}
function cellsFor(papers, limit = 40) {
  return papers.slice(0, limit).map((paper, index) => {
    const s = readState(paper);
    const archive = hasArchive(s);
    const label = `${index + 1}. ${DECISIONS[s.decision].label}${archive ? ', archive' : ''}`;
    return `<span class="cell ${s.decision}${archive ? ' convo' : ''}" title="${escapeAttr(label)}"></span>`;
  }).join('');
}
function rowMatches(briefing, query) {
  if (!query) return true;
  const hay = [
    briefing.date,
    briefing.topic,
    briefing.title,
    briefing.kicker,
    ...briefing.papers.map(p => `${p.title} ${readState(p).decision} ${readState(p).conversationUrl ? 'conversation' : ''}`)
  ].join(' ').toLowerCase();
  return hay.includes(query);
}
function matchedPapers(briefing, query) {
  if (!query) return [];
  return briefing.papers
    .filter(paper => `${paper.title} ${paper.url} ${paper.section}`.toLowerCase().includes(query))
    .slice(0, 3);
}
function renderWeekBoard() {
  const todayWeekday = weekday(dateKey(new Date()));
  const days = [
    { day: 1, label: 'Mon', topic: 'RAG' },
    { day: 2, label: 'Tue', topic: 'Agent / Deep Research' },
    { day: 3, label: 'Wed', topic: 'Evaluation / Judge' },
    { day: 4, label: 'Thu', topic: 'Acceleration / Long-Context' },
    { day: 5, label: 'Fri', topic: 'Learning / Adaptation' },
    { day: 6, label: 'Sat', topic: 'Findings / Mechanistic' },
    { day: 0, label: 'Sun', topic: 'Open Rotation' }
  ];
  const board = document.getElementById('weekBoard');
  board.innerHTML = days.map(item => {
    const briefings = BRIEFINGS.filter(b => weekday(b.date) === item.day);
    const latest = briefings[0];
    const papers = briefings.flatMap(b => b.papers);
    const readNowPapers = briefings.flatMap(b => sectionPapers(b, 'Read Now'));
    const watchPapers = briefings.flatMap(b => sectionPapers(b, 'Watchlist'));
    const stats = { ...statForPapers(papers), readNow: statForPapers(readNowPapers), watch: statForPapers(watchPapers) };
    stats.conversations = stats.archived;
    const level = levelFor(stats);
    const pct = stats.readNow.total ? Math.round((stats.readNow.done / stats.readNow.total) * 100) : 0;
    const archives = stats.readNow.graded ? `${stats.readNow.archived}/${stats.readNow.graded}` : 'n/a';
    const stateName = stats.readNow.total === 0 ? 'No runs yet' : (level.level >= 4 ? '归档完成' : (stats.readNow.done > 0 ? '推进中' : '待启动'));
    return `
      <button type="button" class="week-card ${briefings.length ? '' : 'empty'} ${weekdayFilter === item.day ? 'filtered' : ''} ${todayWeekday === item.day ? 'today-topic' : ''}" style="--topic-color:${topicColor(item.day)}" data-day="${item.day}" data-slug="${latest ? escapeAttr(latest.slug) : ''}">
        <div class="week-day">${item.label}</div>
        <div class="week-topic">${item.topic}</div>
        <div class="topic-meter" style="--meter-pct:${pct}%"><span></span></div>
        <div class="topic-stats">
          <span class="topic-compact-line"><b>${stats.readNow.done}/${stats.readNow.total}</b> · <b>+${stats.watch.done}</b> · <b class="topic-star">★${stats.starred}</b></span>
          <span class="topic-archive-line">arch ${archives} · Lv.${level.level} ${stateName}</span>
        </div>
      </button>
    `;
  }).join('');
  board.querySelectorAll('[data-day]').forEach(btn => {
    btn.addEventListener('click', () => {
      const day = Number(btn.dataset.day);
      weekdayFilter = weekdayFilter === day ? null : day;
      render();
    });
  });
}
function renderCalendarStrip() {
  const body = document.querySelector('.timeline-body');
  const toggle = document.getElementById('calendarToggle');
  const strip = document.getElementById('calendarStrip');
  const monthLabel = document.getElementById('calendarMonthLabel');
  const sourceLinks = sourceLinksForContribution(selectedContributionDate);
  const today = dateKey(new Date());
  const briefingByDate = new Map(BRIEFINGS.map(b => [b.date, b]));
  const first = parseDateKey(`${addMonths(calendarMonth, -1)}-01`);
  const monthStart = addDays(first, -((first.getDay() + 6) % 7));
  const [endYear, endMonth] = addMonths(calendarMonth, 1).split('-').map(Number);
  const last = new Date(endYear, endMonth, 0);
  const monthEnd = addDays(last, 6 - ((last.getDay() + 6) % 7));
  const monthDays = [];
  for (let cursor = monthStart; cursor <= monthEnd; cursor = addDays(cursor, 1)) monthDays.push(dateKey(cursor));
  body.classList.toggle('collapsed', calendarCollapsed);
  toggle.textContent = calendarCollapsed ? '展开 ▼' : '收起 ▲';
  toggle.setAttribute('aria-expanded', String(!calendarCollapsed));
  monthLabel.textContent = calendarMonth.replace('-', ' / ');
  strip.innerHTML = monthDays.map(dayKey => {
    const b = briefingByDate.get(dayKey);
    const date = parseDateKey(dayKey);
    const day = date.getDay();
    const holiday = CHINA_HOLIDAYS[dayKey];
    const outside = !dayKey.startsWith(calendarMonth);
    const dayClass = holiday ? holiday.type : ((day === 0 || day === 6) ? 'weekend' : 'weekday');
    if (!b) {
      return `
        <div class="calendar-day empty ${outside ? 'outside' : ''} ${dayClass} ${dayKey === today ? 'today' : ''}" style="--topic-color:${topicColor(day)}">
          <div class="calendar-date"><span>${dayKey.slice(5)}</span></div>
          <div class="calendar-empty-mark">—</div>
        </div>
      `;
    }
    const stats = paperStats(b);
    const level = levelFor(stats);
    const pct = stats.readNow.total ? Math.round((stats.readNow.done / stats.readNow.total) * 100) : 0;
    const watchlist = sectionPapers(b, 'Watchlist');
    const badgeBoost = level.level >= 5 ? 10 : (level.level >= 4 ? 7 : 0);
    const topic = projectFor(b).name.replace(/^(Mon|Tue|Wed|Thu|Fri|Sat|Sun)\s*/, '');
    const bonusDone = watchlist.filter(paper => isFiled(readState(paper).decision)).length;
    return `
      <button type="button" class="calendar-day ${outside ? 'outside' : ''} ${dayClass} ${b.slug === selected ? 'active' : ''} ${sourceLinks.has(b.slug) ? 'linked' : ''} ${b.date === today ? 'today' : ''}" style="--topic-color:${topicColor(day)};--day-fill:${pct}%" data-slug="${escapeAttr(b.slug)}" aria-label="${escapeAttr(`${b.date} ${topic} Lv.${level.level}`)}">
        <div class="calendar-date"><span>${b.date.slice(5)}</span>${importantDots(stats.starred)}</div>
        <div class="calendar-status-row">
          <div class="calendar-badge lv${level.level}" style="color:${level.color};--badge-boost:${badgeBoost}px"><span>${level.mark}</span></div>
          <div class="calendar-level">L${level.level}</div>
        </div>
        <div class="calendar-main"><b>${stats.readNow.done}/${stats.readNow.total}</b><b>+${bonusDone}</b></div>
        <div class="calendar-read-dots" aria-label="Read Now progress ${stats.readNow.done}/${stats.readNow.total}"></div>
      </button>
    `;
  }).join('');
  strip.querySelectorAll('[data-slug]').forEach(btn => {
    btn.addEventListener('click', () => {
      selected = btn.dataset.slug;
      const b = BRIEFINGS.find(item => item.slug === selected);
      weekdayFilter = b ? weekday(b.date) : weekdayFilter;
      history.replaceState(null, '', '#' + encodeURIComponent(selected));
      render();
    });
  });
  updateCalendarMonthFromScroll();
}
function updateCalendarMonthFromScroll() {
  const panel = document.getElementById('calendarPanel');
  const label = document.getElementById('calendarMonthLabel');
  if (!panel || !label) return;
  const days = [...panel.querySelectorAll('.calendar-day')];
  const panelTop = panel.getBoundingClientRect().top;
  const visible = days.find(day => day.getBoundingClientRect().bottom > panelTop + 18);
  const text = visible && visible.querySelector('.calendar-date span');
  if (!text) return;
  const value = text.textContent.trim();
  if (/^\d{2}-\d{2}$/.test(value)) {
    const year = calendarMonth.slice(0, 4);
    const visibleMonth = value.slice(0, 2);
    label.textContent = `${year} / ${visibleMonth}`;
    days.forEach(day => {
      const dayText = day.querySelector('.calendar-date span');
      const inVisibleMonth = dayText && dayText.textContent.trim().startsWith(`${visibleMonth}-`);
      day.classList.toggle('month-visible', Boolean(inVisibleMonth));
    });
  }
}
function renderContribution() {
  const grid = document.getElementById('contribGrid');
  const detail = document.getElementById('contribDetail');
  const summary = document.getElementById('contribSummary');
  const records = contributionRecords();
  const byDay = records.reduce((acc, item) => {
    (acc[item.day] ||= []).push(item);
    return acc;
  }, {});
  const days = contributionRange();
  if (!selectedContributionDate && records.length) selectedContributionDate = records[records.length - 1].day;
  grid.innerHTML = days.map(day => {
    const count = (byDay[day] || []).length;
    return `
      <button type="button" class="contrib-day ${selectedContributionDate === day ? 'active' : ''}" style="--heat:${contributionHeat(count)}" data-contrib-day="${day}" aria-label="${day} ${count} papers">
        <span>${day.slice(5)}</span>
      </button>
    `;
  }).join('');
  grid.querySelectorAll('[data-contrib-day]').forEach(btn => {
    btn.addEventListener('click', () => {
      selectedContributionDate = btn.dataset.contribDay;
      renderCalendarStrip();
      renderContribution();
    });
  });
  const selectedRecords = byDay[selectedContributionDate] || [];
  const sources = selectedRecords.reduce((acc, item) => {
    acc[item.briefing.slug] ||= { briefing: item.briefing, count: 0 };
    acc[item.briefing.slug].count += 1;
    return acc;
  }, {});
  const decisionCounts = selectedRecords.reduce((acc, item) => {
    acc[item.decision] = (acc[item.decision] || 0) + 1;
    return acc;
  }, {});
  summary.textContent = selectedContributionDate ? `${selectedContributionDate} · ${selectedRecords.length} papers · ${Object.keys(sources).length} source briefings` : 'select a day';
  detail.innerHTML = `
    <div class="contrib-kpis">
      <div class="contrib-kpi"><b>${selectedRecords.length}</b>${selectedContributionDate || '未选择'} papers</div>
      <div class="contrib-kpi"><b>${Object.keys(sources).length}</b>source briefings</div>
      <div class="contrib-kpi"><b>${decisionCounts.important || 0}</b>important</div>
      <div class="contrib-kpi"><b>${selectedRecords.filter(item => item.archived).length}</b>archived</div>
    </div>
    <div class="contrib-list">
      ${selectedRecords.length ? selectedRecords.map(item => `
        <div class="contrib-item">
          <span class="source">${item.briefing.date.slice(5)}</span>
          <span class="paper">${escapeAttr(item.paper.title)}</span>
          <span class="decision" style="--decision-color:${decisionColor(item.decision)}">${DECISIONS[item.decision].label}</span>
        </div>
      `).join('') : '<div class="empty">这一天还没有实际阅读贡献。</div>'}
    </div>
  `;
}
function renderList() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  const list = document.getElementById('briefingList');
  list.innerHTML = '';
  BRIEFINGS
    .filter(b => {
      const stats = paperStats(b);
      if (!q && weekdayFilter !== null && weekday(b.date) !== weekdayFilter) return false;
      if (filter === 'pending' && stats.readNow.done === stats.readNow.total) return false;
      if (filter === 'filed' && stats.readNow.done < stats.readNow.total) return false;
      if (filter === 'important' && stats.starred === 0) return false;
      return rowMatches(b, q);
    })
    .forEach(b => {
      const stats = paperStats(b);
      const matches = matchedPapers(b, q);
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'briefing-row' + (b.slug === selected ? ' active' : '');
      btn.style.setProperty('--topic-color', topicColor(weekday(b.date)));
      const level = levelFor(stats);
      btn.innerHTML = `
        <div class="topic-rail"></div>
        <div class="date">${b.date.slice(5) || '----'}</div>
        <div class="level-badge" style="--pct:${level.pct};--level-color:${level.color};--level-boost:${level.boost || 0}px">
          <div class="level-ring"><div class="level-inner">${level.mark}</div></div>
          <div class="level-name">Lv.${level.level} ${level.name}${stats.watch.done ? ` +${stats.watch.done}` : ''}</div>
          ${bonusDots(sectionPapers(b, 'Watchlist'))}
        </div>
        <div class="topic">
          <div class="topic-name">${b.cardTitle || b.title}</div>
          <div class="topic-kicker">${b.kicker || b.title}</div>
          <div class="row-sub">${stats.readNow.done}/${stats.readNow.total} Read Now · +${stats.watch.done} Watchlist bonus</div>
          <div class="stat-grid">
            <span><b>${stats.readNow.done}/${stats.readNow.total}</b> main</span>
            <span><b>${stats.skipped}</b> skipped</span>
            <span><b>${stats.queued + stats.reading}</b> pending</span>
            <span><b>${stats.conversations}</b> archives</span>
            <span><b>${stats.starred}</b> important</span>
          </div>
          ${matches.length ? `<div class="match-list">${matches.map(p => `<span class="match-chip">${escapeAttr(p.section)} · ${escapeAttr(p.title)}</span>`).join('')}</div>` : ''}
        </div>
      `;
      btn.addEventListener('click', () => {
        selected = b.slug;
        history.replaceState(null, '', '#' + encodeURIComponent(b.slug));
        render();
      });
      list.appendChild(btn);
    });
  if (!list.children.length) {
    const label = weekdayFilter === null ? '当前筛选' : PROJECTS[weekdayFilter].name;
    list.innerHTML = `<div class="empty">${label} 下面还没有 briefing。</div>`;
  }
}
function renderDetail() {
  const detail = document.getElementById('detail');
  const b = BRIEFINGS.find(item => item.slug === selected) || BRIEFINGS[0];
  if (!b) {
    detail.innerHTML = '<p class="empty">No briefings found.</p>';
    return;
  }
  selected = b.slug;
  const stats = paperStats(b);
  const project = projectFor(b);
  const readNow = sectionPapers(b, 'Read Now');
  const watchlist = sectionPapers(b, 'Watchlist');
  detail.innerHTML = `
    <div class="detail-head">
      <div class="detail-top">
        <div>
          <h2>${b.topic}</h2>
          <div class="topic-kicker">${b.cardTitle || b.title}</div>
          <div class="summary">
            <span class="pill">${b.date}</span>
            <span class="pill">Read Now ${stats.readNow.done}/${stats.readNow.total}</span>
            <span class="pill">Watchlist +${stats.watch.done}</span>
            <span class="pill">${stats.conversations} archives</span>
            <span class="pill">${project.name}</span>
          </div>
        </div>
        <a class="open-original" href="${briefingHref(b)}">读原文</a>
      </div>
      <div class="legend">
        <span><i class="mini open"></i>未选择</span>
        <span><i class="mini skip"></i>不读</span>
        <span><i class="mini queue"></i>待读</span>
        <span><i class="mini reading"></i>阅读中</span>
        <span><i class="mini pass"></i>简单pass</span>
        <span><i class="mini read"></i>正常读</span>
        <span><i class="mini important"></i>重要</span>
        <span>小圆点 = 已挂 GPT 对话 / share / transcript</span>
      </div>
    </div>
    <div class="empty">
      <p>这里保留当天的阅读进度和前沿变化，不在总览里替你判断具体论文。</p>
      ${b.frontier ? `<div class="frontier-note"><strong>前沿变化观察</strong><br>${b.frontier}</div>` : ''}
      <div class="status-blocks">
        <div>
          <div class="status-block-head">Read Now</div>
          <div class="cells" style="justify-content:flex-start;max-width:none;margin-top:8px;">${cellsFor(readNow)}</div>
        </div>
        <div>
          <div class="status-block-head">Watchlist bonus</div>
          <div class="cells" style="justify-content:flex-start;max-width:none;margin-top:8px;">${cellsFor(watchlist)}</div>
        </div>
      </div>
    </div>
  `;
}
function showTextModal(title, value, actions = []) {
  const modal = document.getElementById('modal');
  const text = document.getElementById('modalText');
  const actionsNode = document.getElementById('modalActions');
  document.getElementById('modalTitle').textContent = title;
  text.value = value;
  actionsNode.innerHTML = '';
  if (!actions.length) {
    actions = [{ label: '复制', run: value => navigator.clipboard.writeText(value).then(() => toast('已复制')) }];
  }
  actions.forEach(action => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'action-btn';
    btn.textContent = action.label;
    btn.addEventListener('click', async () => {
      const result = await action.run(text.value);
      if (result !== false) modal.classList.remove('show');
    });
    actionsNode.appendChild(btn);
  });
  modal.classList.add('show');
  text.focus();
}
document.getElementById('modalClose').addEventListener('click', () => document.getElementById('modal').classList.remove('show'));
document.getElementById('modal').addEventListener('click', event => {
  if (event.target.id === 'modal') event.currentTarget.classList.remove('show');
});
document.getElementById('search').addEventListener('input', renderList);
document.getElementById('calendarToggle').addEventListener('click', () => {
  calendarCollapsed = !calendarCollapsed;
  localStorage.setItem('researchBriefings.calendarCollapsed', calendarCollapsed ? '1' : '0');
  render();
});
document.getElementById('calendarPrev').addEventListener('click', () => {
  calendarMonth = addMonths(calendarMonth, -1);
  renderCalendarStrip();
});
document.getElementById('calendarNext').addEventListener('click', () => {
  calendarMonth = addMonths(calendarMonth, 1);
  renderCalendarStrip();
});
document.getElementById('calendarPanel').addEventListener('scroll', updateCalendarMonthFromScroll, { passive: true });
document.querySelectorAll('.seg button').forEach(btn => {
  btn.addEventListener('click', () => {
    filter = btn.dataset.filter;
    document.querySelectorAll('.seg button').forEach(item => item.classList.toggle('active', item === btn));
    renderList();
  });
});
render();
</script>
