<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Research Briefings Console</title>
<style>
:root {
  color-scheme: light;
  --bg: #eef5f7;
  --panel: rgba(255, 255, 255, .88);
  --panel-2: rgba(247, 252, 253, .96);
  --ink: #12252b;
  --muted: #62777d;
  --line: rgba(37, 91, 102, .18);
  --line-strong: rgba(22, 110, 128, .38);
  --cyan: #0089a7;
  --blue: #3f7bd9;
  --amber: #d89a17;
  --skip: #8aa3ad;
  --queue: #4b83d1;
  --reading: #00a6a6;
  --pass: #d89a17;
  --read: #1c9a63;
  --important: #8f4fe8;
  --green: #1c9a63;
  --violet: #8f4fe8;
  --slate: #90a4ae;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  min-height: 100vh;
  background:
    linear-gradient(rgba(0, 137, 167, .06) 1px, transparent 1px) 0 0 / 30px 30px,
    linear-gradient(90deg, rgba(0, 137, 167, .045) 1px, transparent 1px) 0 0 / 30px 30px,
    linear-gradient(180deg, #eef5f7 0%, #f8fbfc 42%, #ffffff 100%);
  color: var(--ink);
  font-family: "Bahnschrift", "DIN Condensed", "Microsoft YaHei", "PingFang SC", sans-serif;
}
body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background: linear-gradient(120deg, rgba(0,137,167,.12), transparent 34%, rgba(63,123,217,.1));
  mask-image: linear-gradient(180deg, rgba(255,255,255,.72), rgba(255,255,255,0));
}
button, input, textarea { font: inherit; }
button { color: inherit; }
a { color: inherit; }
.shell { max-width: 1440px; margin: 0 auto; padding: 28px 22px 48px; position: relative; }
.topbar {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 22px;
  align-items: end;
  padding: 18px 0 22px;
  border-bottom: 1px solid var(--line-strong);
}
.kicker { color: var(--cyan); font-size: 13px; letter-spacing: .08em; text-transform: uppercase; }
h1 { margin: 6px 0 0; font-size: clamp(34px, 6vw, 78px); line-height: .9; letter-spacing: 0; }
.hud { text-align: right; color: var(--muted); font-size: 13px; line-height: 1.65; }
.global-readout { color: var(--ink); font-size: 20px; font-variant-numeric: tabular-nums; }
.toolbar {
  display: grid;
  grid-template-columns: minmax(240px, 1fr) auto;
  gap: 12px;
  margin: 18px 0;
  align-items: center;
}
.weekboard {
  display: grid;
  grid-template-columns: repeat(7, minmax(0, 1fr));
  gap: 10px;
  margin: 0 0 18px;
}
.week-card {
  border: 1px solid var(--line);
  border-radius: 7px;
  background: rgba(255,255,255,.82);
  padding: 11px;
  text-align: left;
  cursor: pointer;
  min-height: 132px;
}
.week-card:hover, .week-card.active { border-color: var(--cyan); background: #f4fbfd; }
.week-card.filtered { box-shadow: 0 0 0 3px rgba(0,137,167,.12); }
.week-card.empty { opacity: .72; }
.week-day { color: var(--cyan); font-size: 12px; font-weight: 800; text-transform: uppercase; }
.week-topic { margin-top: 6px; font-weight: 800; line-height: 1.2; }
.week-meta { margin-top: 8px; color: var(--muted); font-size: 12px; line-height: 1.45; }
.week-cells { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 9px; }
.week-cells .cell { width: 13px; height: 13px; }
.calendar-strip {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding: 2px 0 14px;
  margin-top: -6px;
}
.calendar-day {
  min-width: 94px;
  border: 1px solid var(--line);
  border-radius: 7px;
  background: rgba(255,255,255,.82);
  padding: 8px;
  text-align: left;
  cursor: pointer;
}
.calendar-day:hover, .calendar-day.active { border-color: var(--cyan); background: #f4fbfd; }
.calendar-date { color: var(--cyan); font-size: 13px; font-weight: 800; font-variant-numeric: tabular-nums; }
.calendar-topic { color: var(--muted); font-size: 11px; margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.calendar-badge {
  margin-top: 7px;
  width: 30px;
  height: 30px;
  border-radius: 999px;
  display: grid;
  place-items: center;
  font-size: 15px;
  font-weight: 900;
  background: #fff;
  border: 1px solid currentColor;
}
.calendar-swatch {
  height: 7px;
  border-radius: 999px;
  border: 1px solid rgba(18,37,43,.12);
  margin-top: 8px;
  background: #e6eef0;
  overflow: hidden;
}
.search, .textarea-input {
  width: 100%;
  border: 1px solid var(--line);
  background: rgba(255, 255, 255, .86);
  color: var(--ink);
  border-radius: 6px;
  padding: 11px 13px;
  outline: none;
}
.search:focus, .textarea-input:focus { border-color: var(--cyan); box-shadow: 0 0 0 3px rgba(0,137,167,.12); }
.seg { display: inline-flex; border: 1px solid var(--line); border-radius: 6px; overflow: hidden; background: rgba(255,255,255,.76); }
.seg button, .ghost-btn, .action-btn, .mode-btn {
  border: 0;
  background: transparent;
  cursor: pointer;
  white-space: nowrap;
}
.seg button { padding: 10px 13px; color: var(--muted); }
.seg button.active { background: var(--cyan); color: #fff; }
.layout { display: grid; grid-template-columns: minmax(420px, 1fr) minmax(460px, 620px); gap: 18px; align-items: start; }
.overview {
  display: grid;
  gap: 10px;
}
.briefing-row {
  width: 100%;
  display: grid;
  grid-template-columns: 92px 112px minmax(160px, 1fr) auto;
  gap: 14px;
  align-items: center;
  border: 1px solid var(--line);
  background: linear-gradient(90deg, rgba(255, 255, 255, .96), rgba(241, 249, 252, .86));
  border-radius: 7px;
  padding: 12px;
  text-align: left;
  cursor: pointer;
  transition: border-color .16s ease, transform .16s ease, background .16s ease;
}
.briefing-row:hover, .briefing-row.active {
  border-color: var(--cyan);
  transform: translateY(-1px);
  background: linear-gradient(90deg, rgba(246, 253, 255, .98), rgba(232, 246, 251, .9));
}
.date { color: var(--cyan); font-variant-numeric: tabular-nums; font-weight: 700; }
.topic { min-width: 0; }
.topic-name { font-weight: 700; line-height: 1.3; }
.topic-kicker { color: var(--muted); font-size: 13px; margin-top: 6px; line-height: 1.35; }
.row-sub { color: var(--muted); font-size: 12px; margin-top: 5px; }
.level-badge {
  display: grid;
  justify-items: center;
  gap: 4px;
}
.level-ring {
  width: calc(64px + var(--level-boost, 0px));
  height: calc(64px + var(--level-boost, 0px));
  border-radius: 999px;
  display: grid;
  place-items: center;
  background:
    conic-gradient(var(--level-color) calc(var(--pct) * 1%), #dbe8eb 0);
  box-shadow: inset 0 0 0 1px rgba(18,37,43,.08);
}
.level-ring::before {
  content: "";
  position: absolute;
}
.level-inner {
  width: calc(48px + var(--level-boost, 0px) * .65);
  height: calc(48px + var(--level-boost, 0px) * .65);
  border-radius: 999px;
  display: grid;
  place-items: center;
  background: #fff;
  color: var(--level-color);
  font-weight: 900;
  font-size: 22px;
}
.level-name { font-size: 12px; color: var(--muted); font-weight: 800; }
.stat-grid {
  display: grid;
  grid-template-columns: repeat(4, auto);
  gap: 8px 12px;
  color: var(--muted);
  font-size: 12px;
  margin-top: 8px;
}
.stat-grid b { color: var(--ink); font-variant-numeric: tabular-nums; }
.cells { display: flex; gap: 5px; flex-wrap: wrap; justify-content: flex-end; max-width: 360px; }
.cell {
  width: 18px;
  height: 18px;
  border-radius: 3px;
  border: 1px solid rgba(18,37,43,.14);
  background: rgba(255,255,255,.76);
  position: relative;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,.58);
}
.cell.queue {
  background: repeating-linear-gradient(135deg, rgba(75,131,209,.18) 0 4px, rgba(75,131,209,.62) 4px 8px);
  border-color: var(--queue);
}
.cell.reading {
  background: repeating-linear-gradient(135deg, rgba(0,166,166,.2) 0 4px, rgba(0,166,166,.68) 4px 8px);
  border-color: var(--reading);
}
.cell.skip { background: var(--skip); }
.cell.pass { background: var(--pass); }
.cell.read { background: var(--read); }
.cell.important { background: var(--important); }
.cell.skim { background: var(--amber); }
.cell.deep { background: var(--green); }
.cell.open { background: rgba(255,255,255,.76); }
.cell.open::after {
  content: "?";
  position: absolute;
  inset: 0;
  display: grid;
  place-items: center;
  color: var(--slate);
  font-size: 11px;
  font-weight: 900;
}
.cell.star::before {
  content: "";
  position: absolute;
  inset: 3px;
  border-radius: 99px;
  border: 1px solid rgba(255,255,255,.82);
}
.cell.convo::after {
  content: "";
  position: absolute;
  right: -3px;
  bottom: -3px;
  width: 7px;
  height: 7px;
  border-radius: 99px;
  background: var(--violet);
  box-shadow: 0 0 12px var(--violet);
}
.detail {
  position: sticky;
  top: 16px;
  border: 1px solid var(--line-strong);
  background: linear-gradient(180deg, rgba(255, 255, 255, .97), rgba(242, 249, 252, .98));
  border-radius: 7px;
  min-height: 600px;
  overflow: hidden;
}
.detail-head { padding: 18px; border-bottom: 1px solid var(--line); }
.detail-top { display: flex; gap: 12px; justify-content: space-between; align-items: start; }
.detail h2 { margin: 0; font-size: clamp(24px, 3vw, 42px); line-height: 1; letter-spacing: 0; }
.summary { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; color: var(--muted); font-size: 12px; }
.pill { border: 1px solid var(--line); border-radius: 999px; padding: 5px 9px; background: rgba(255,255,255,.72); }
.open-original, .ghost-btn, .action-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 34px;
  border: 1px solid var(--line-strong);
  border-radius: 6px;
  padding: 8px 10px;
  text-decoration: none;
  color: var(--ink);
  background: rgba(255,255,255,.78);
}
.open-original:hover, .ghost-btn:hover, .action-btn:hover { border-color: var(--cyan); color: var(--cyan); }
.legend { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; color: var(--muted); font-size: 12px; }
.legend span { display: inline-flex; align-items: center; gap: 6px; }
.mini { width: 11px; height: 11px; border-radius: 3px; border: 1px solid rgba(18,37,43,.16); display: inline-block; }
.mini.open { background: rgba(255,255,255,.78); }
.mini.queue { background: repeating-linear-gradient(135deg, rgba(75,131,209,.18) 0 3px, rgba(75,131,209,.62) 3px 6px); border-color: var(--queue); }
.mini.reading { background: repeating-linear-gradient(135deg, rgba(0,166,166,.2) 0 3px, rgba(0,166,166,.68) 3px 6px); border-color: var(--reading); }
.mini.skip { background: var(--skip); }
.mini.pass { background: var(--pass); }
.mini.read { background: var(--read); }
.mini.important { background: var(--important); }
.status-blocks { display: grid; gap: 10px; margin-top: 16px; }
.status-block-head { color: var(--muted); font-size: 12px; font-weight: 800; text-transform: uppercase; }
.frontier-note {
  margin-top: 16px;
  border-left: 3px solid var(--cyan);
  padding-left: 12px;
  color: var(--ink);
  line-height: 1.5;
}
.mini.skim { background: var(--amber); }
.mini.deep { background: var(--green); }
.paper-list { list-style: none; padding: 0; margin: 0; }
.section-title {
  position: sticky;
  top: 0;
  z-index: 1;
  padding: 10px 18px;
  border-bottom: 1px solid var(--line);
  border-top: 1px solid var(--line);
  background: rgba(246, 253, 255, .95);
  color: var(--cyan);
  font-size: 12px;
  letter-spacing: .08em;
  text-transform: uppercase;
}
.modes { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
.mode-btn {
  min-height: 30px;
  border: 1px solid var(--line);
  border-radius: 6px;
  padding: 6px 9px;
  color: var(--muted);
  background: rgba(255,255,255,.025);
}
.mode-btn.active, .mode-btn:hover { color: #fff; background: var(--cyan); border-color: var(--cyan); }
.mode-btn.skip.active, .mode-btn.skip:hover { background: var(--red); border-color: var(--red); color: #fff; }
.mode-btn.star.active { background: transparent; color: var(--violet); border-color: var(--violet); box-shadow: inset 0 0 18px rgba(185,147,255,.12); }
.paper-actions { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 10px; }
.action-btn { min-height: 31px; font-size: 12px; }
.convo-line {
  margin-top: 9px;
  color: var(--muted);
  font-size: 12px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
}
.convo-link { color: var(--violet); text-decoration: none; }
.convo-link:hover { text-decoration: underline; }
.empty { padding: 34px 18px; color: var(--muted); }
.toast {
  position: fixed;
  left: 50%;
  bottom: 22px;
  transform: translateX(-50%);
  background: rgba(255,255,255,.96);
  border: 1px solid var(--cyan);
  color: var(--ink);
  border-radius: 7px;
  padding: 10px 14px;
  box-shadow: 0 16px 44px rgba(31,72,84,.18);
  opacity: 0;
  pointer-events: none;
  transition: opacity .18s ease;
}
.toast.show { opacity: 1; }
.modal {
  position: fixed;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  background: rgba(18,37,43,.28);
  z-index: 10;
  padding: 20px;
}
.modal.show { display: flex; }
.modal-panel {
  width: min(720px, 100%);
  border: 1px solid var(--line-strong);
  border-radius: 7px;
  background: var(--panel-2);
  padding: 18px;
  box-shadow: 0 30px 80px rgba(31,72,84,.22);
}
.modal-head { display: flex; justify-content: space-between; gap: 12px; align-items: center; margin-bottom: 12px; }
.modal-title { font-size: 18px; font-weight: 700; }
.textarea-input { min-height: 110px; resize: vertical; }
.modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 12px; }
@media (max-width: 980px) {
  .toolbar, .layout, .topbar { grid-template-columns: 1fr; }
  .weekboard { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .hud { text-align: left; }
  .detail { position: static; }
  .briefing-row { grid-template-columns: 72px 90px minmax(0, 1fr); }
  .cells { grid-column: 1 / -1; justify-content: flex-start; }
}
</style>
</head>

<main class="shell">
  <header class="topbar">
    <div>
      <div class="kicker">paper triage console</div>
      <h1>Research<br>Briefings</h1>
    </div>

</main>

<div id="modal" class="modal" role="dialog" aria-modal="true">

    <div class="modal-head">

      <button type="button" class="ghost-btn" id="modalClose">关闭</button>
    </div>
    <textarea id="modalText" class="textarea-input"></textarea>
    <div class="modal-actions" id="modalActions"></div>
  </div>
</div>

  const next = { ...readState(paper), ...patch, updatedAt: new Date().toISOString() };
  next.star = next.decision === 'important';
  localStorage.setItem(stateKey(paper.id), JSON.stringify(next));
  render();
}
function weekday(dateText) {
  const parts = dateText.split('-').map(Number);
  if (parts.length !== 3 || parts.some(Number.isNaN)) return 1;
  return new Date(parts[0], parts[1] - 1, parts[2]).getDay();
}
function projectFor(briefing) { return PROJECTS[weekday(briefing.date)] || PROJECTS[1]; }
function isFiled(decision) { return ['skip', 'pass', 'read', 'important'].includes(decision); }
function needsArchive(decision) { return ['pass', 'read', 'important'].includes(decision); }
function hasArchive(state) { return Boolean(state.conversationUrl || state.shareUrl || state.transcript); }
function sectionPapers(briefing, section) { return briefing.papers.filter(paper => paper.section === section); }
function statForPapers(papers) {
  const states = papers.map(readState);
  const started = states.filter(s => s.decision !== 'open').length;
  const done = states.filter(s => isFiled(s.decision)).length;
  const graded = states.filter(s => needsArchive(s.decision)).length;
  const archived = states.filter(s => needsArchive(s.decision) && hasArchive(s)).length;
  const reading = states.filter(s => s.decision === 'reading').length;
  const queued = states.filter(s => s.decision === 'queue').length;
  const skipped = states.filter(s => s.decision === 'skip').length;
  const starred = states.filter(s => s.decision === 'important').length;
  return { total: papers.length, started, done, graded, archived, reading, queued, skipped, open: papers.length - started, starred };
}
function paperStats(briefing) {
  const all = statForPapers(briefing.papers);
  const readNow = statForPapers(sectionPapers(briefing, 'Read Now'));
  const watch = statForPapers(sectionPapers(briefing, 'Watchlist'));
  return { ...all, conversations: all.archived, readNow, watch, bonus: watch.done };
}
function levelFor(stats) {
  const main = stats.readNow && stats.readNow.total ? stats.readNow : stats;
  const pct = main.total ? Math.round((main.done / main.total) * 100) : 0;
  if (!main.total || main.started === 0) return { level: 0, name: 'Unpicked', mark: '?', pct: 0, color: '#90a4ae', boost: 0 };
  const allMainFiled = main.done === main.total;
  const archiveComplete = main.archived >= main.graded;
  if (allMainFiled && archiveComplete && main.starred > 0) return { level: 5, name: 'Signal', mark: '◆', pct: 100, color: '#8f4fe8', boost: 14 };
  if (allMainFiled && archiveComplete) return { level: 4, name: 'Filed', mark: '●', pct: 100, color: '#6b63ff', boost: 10 };
  if (allMainFiled) return { level: 3, name: 'Need links', mark: '◕', pct: 100, color: '#1c9a63', boost: 0 };
  if (main.done > 0) return { level: 2, name: 'Deciding', mark: '◑', pct: Math.max(pct, 35), color: '#0089a7', boost: 0 };
  return { level: 1, name: 'Queued', mark: '◌', pct: 0, color: '#4b83d1', boost: 0 };
}
function allPapers() { return BRIEFINGS.flatMap(b => b.papers.map(p => ({ briefing: b, paper: p }))); }
function toast(message) {
  const node = document.getElementById('toast');
  node.textContent = message;
  node.classList.add('show');
  window.setTimeout(() => node.classList.remove('show'), 1800);
}
function escapeAttr(value) {
  return String(value).replaceAll('&', '&amp;').replaceAll('"', '&quot;').replaceAll('<', '&lt;').replaceAll('>', '&gt;');
}
function render() {
  renderGlobal();
  renderWeekBoard();
  renderCalendarStrip();
  renderList();
  renderDetail();
}
function renderGlobal() {
  const pairs = allPapers();
  const done = pairs.filter(({ paper }) => isFiled(readState(paper).decision)).length;
  const started = pairs.filter(({ paper }) => readState(paper).decision !== 'open').length;
  const archives = pairs.filter(({ paper }) => hasArchive(readState(paper))).length;
  document.getElementById('globalStats').textContent = `${done}/${pairs.length} filed · ${started} touched · ${archives} archives`;
  const b = BRIEFINGS.find(item => item.slug === selected) || BRIEFINGS[0];
  const project = b ? projectFor(b) : null;
  const filterText = weekdayFilter === null ? 'all topics' : `filtered: ${PROJECTS[weekdayFilter].name}`;
  document.getElementById('activeProject').textContent = project ? `${filterText} · active route: ${project.name}` : filterText;
}
function decisionColor(decision) {
  return {
    open: '#e6eef0',
    queue: '#4b83d1',
    reading: '#00a6a6',
    skip: '#8aa3ad',
    pass: '#d89a17',
    read: '#1c9a63',
    important: '#8f4fe8'
  }[decision] || '#e6eef0';
}
function mixGradient(papers) {
  const states = papers.map(p => readState(p).decision);
  if (!states.length) return '#e6eef0';
  const counts = states.reduce((acc, decision) => {
    acc[decision] = (acc[decision] || 0) + 1;
    return acc;
  }, {});
  let start = 0;
  const stops = Object.entries(counts).map(([decision, count]) => {
    const end = start + (count / states.length) * 100;
    const chunk = `${decisionColor(decision)} ${start.toFixed(2)}% ${end.toFixed(2)}%`;
    start = end;
    return chunk;
  });
  return `linear-gradient(90deg, ${stops.join(', ')})`;
}
function cellsFor(papers, limit = 40) {
  return papers.slice(0, limit).map((paper, index) => {
    const s = readState(paper);
    const archive = hasArchive(s);
    const label = `${index + 1}. ${DECISIONS[s.decision].label}${archive ? ', archive' : ''}`;
    return `<span class="cell ${s.decision}${archive ? ' convo' : ''}" title="${escapeAttr(label)}"></span>`;
  }).join('');
}
function rowMatches(briefing, query) {
  if (!query) return true;
  const hay = [
    briefing.date,
    briefing.topic,
    briefing.title,
    briefing.kicker,
    ...briefing.papers.map(p => `${p.title} ${readState(p).decision} ${readState(p).conversationUrl ? 'conversation' : ''}`)
  ].join(' ').toLowerCase();
  return hay.includes(query);
}
function renderWeekBoard() {
  const days = [
    { day: 1, label: 'Mon', topic: 'RAG' },
    { day: 2, label: 'Tue', topic: 'Agent / Deep Research' },
    { day: 3, label: 'Wed', topic: 'Evaluation / Judge' },
    { day: 4, label: 'Thu', topic: 'Acceleration / Long-Context' },
    { day: 5, label: 'Fri', topic: 'Learning / Adaptation' },
    { day: 6, label: 'Sat', topic: 'Findings / Mechanistic' },
    { day: 0, label: 'Sun', topic: 'Open Rotation' }
  ];
  const board = document.getElementById('weekBoard');
  board.innerHTML = days.map(item => {
    const briefings = BRIEFINGS.filter(b => weekday(b.date) === item.day);
    const latest = briefings[0];
    const papers = briefings.flatMap(b => b.papers);
    const stats = { ...statForPapers(papers), readNow: statForPapers(briefings.flatMap(b => sectionPapers(b, 'Read Now'))), watch: statForPapers(briefings.flatMap(b => sectionPapers(b, 'Watchlist'))) };
    stats.conversations = stats.archived;
    const level = levelFor(stats);
    const latestTitle = latest ? (latest.cardTitle || latest.title) : '暂无 briefing';
    return `
      <button type="button" class="week-card ${briefings.length ? '' : 'empty'} ${weekdayFilter === item.day ? 'filtered' : ''} ${latest && latest.slug === selected ? 'active' : ''}" data-day="${item.day}" data-slug="${latest ? escapeAttr(latest.slug) : ''}">
        <div class="week-day">${item.label}</div>
        <div class="week-topic">${item.topic}</div>
        <div class="calendar-swatch" style="background:${mixGradient(papers)}"></div>
        <div class="week-meta">${latestTitle}<br>${briefings.length} briefings · ${stats.done}/${papers.length} filed · ${stats.queued + stats.reading} pending<br>Lv.${level.level} ${level.name}${latest ? ` · ${latest.date}` : ''}</div>
      </button>
    `;
  }).join('');
  board.querySelectorAll('[data-day]').forEach(btn => {
    btn.addEventListener('click', () => {
      const day = Number(btn.dataset.day);
      weekdayFilter = weekdayFilter === day ? null : day;
      if (btn.dataset.slug) {
        selected = btn.dataset.slug;
        history.replaceState(null, '', '#' + encodeURIComponent(selected));
      }
      render();
    });
  });
}
function renderCalendarStrip() {
  const strip = document.getElementById('calendarStrip');
  strip.innerHTML = BRIEFINGS.slice().reverse().map(b => {
    const stats = paperStats(b);
    const level = levelFor(stats);
    return `
      <button type="button" class="calendar-day ${b.slug === selected ? 'active' : ''}" data-slug="${escapeAttr(b.slug)}" title="${escapeAttr(b.topic)}">
        <div class="calendar-date">${b.date.slice(5)}</div>
        <div class="calendar-topic">${projectFor(b).name.replace(/^(Mon|Tue|Wed|Thu|Fri|Sat|Sun)\\s*/, '')}</div>
        <div class="calendar-swatch" style="background:${mixGradient(b.papers)}"></div>
        <div class="calendar-badge" style="color:${level.color}">${level.mark}</div>
      </button>
    `;
  }).join('');
  strip.querySelectorAll('[data-slug]').forEach(btn => {
    btn.addEventListener('click', () => {
      selected = btn.dataset.slug;
      history.replaceState(null, '', '#' + encodeURIComponent(selected));
      render();
    });
  });
}
function renderList() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  const list = document.getElementById('briefingList');
  list.innerHTML = '';
  BRIEFINGS
    .filter(b => {
      const stats = paperStats(b);
      if (weekdayFilter !== null && weekday(b.date) !== weekdayFilter) return false;
      if (filter === 'pending' && stats.readNow.done === stats.readNow.total) return false;
      if (filter === 'filed' && stats.readNow.done < stats.readNow.total) return false;
      if (filter === 'important' && stats.starred === 0) return false;
      return rowMatches(b, q);
    })
    .forEach(b => {
      const stats = paperStats(b);
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'briefing-row' + (b.slug === selected ? ' active' : '');
      const level = levelFor(stats);
      btn.innerHTML = `
        <div class="date">${b.date.slice(5) || '----'}</div>
        <div class="level-badge" style="--pct:${level.pct};--level-color:${level.color};--level-boost:${level.boost || 0}px">
          <div class="level-ring"><div class="level-inner">${level.mark}</div></div>
          <div class="level-name">Lv.${level.level} ${level.name}</div>
        </div>
        <div class="topic">
          <div class="topic-name">${b.cardTitle || b.title}</div>
          <div class="topic-kicker">${b.kicker || b.title}</div>
          <div class="row-sub">${stats.readNow.done}/${stats.readNow.total} Read Now · +${stats.watch.done} Watchlist bonus</div>
          <div class="stat-grid">
            <span><b>${stats.readNow.done}/${stats.readNow.total}</b> main</span>
            <span><b>${stats.skipped}</b> skipped</span>
            <span><b>${stats.queued + stats.reading}</b> pending</span>
            <span><b>${stats.conversations}</b> archives</span>
            <span><b>${stats.starred}</b> important</span>
          </div>
        </div>
      `;
      btn.addEventListener('click', () => {
        selected = b.slug;
        history.replaceState(null, '', '#' + encodeURIComponent(b.slug));
        render();
      });
      list.appendChild(btn);
    });
  if (!list.children.length) {
    const label = weekdayFilter === null ? '当前筛选' : PROJECTS[weekdayFilter].name;
    list.innerHTML = `<div class="empty">${label} 下面还没有 briefing。</div>`;
  }
}
function renderDetail() {
  const detail = document.getElementById('detail');
  const b = BRIEFINGS.find(item => item.slug === selected) || BRIEFINGS[0];
  if (!b) {
    detail.innerHTML = '<p class="empty">No briefings found.</p>';
    return;
  }
  selected = b.slug;
  const stats = paperStats(b);
  const project = projectFor(b);
  const readNow = sectionPapers(b, 'Read Now');
  const watchlist = sectionPapers(b, 'Watchlist');
  detail.innerHTML = `
    <div class="detail-head">
      <div class="detail-top">
        <div>
          <h2>${b.topic}</h2>
          <div class="topic-kicker">${b.cardTitle || b.title}</div>
          <div class="summary">
            <span class="pill">${b.date}</span>
            <span class="pill">Read Now ${stats.readNow.done}/${stats.readNow.total}</span>
            <span class="pill">Watchlist +${stats.watch.done}</span>
            <span class="pill">${stats.conversations} archives</span>
            <span class="pill">${project.name}</span>
          </div>
        </div>
        <a class="open-original" href="${b.url}" target="_blank" rel="noopener">读原文</a>
      </div>
      <div class="legend">
        <span><i class="mini open"></i>未选择</span>
        <span><i class="mini skip"></i>不读</span>
        <span><i class="mini queue"></i>待读</span>
        <span><i class="mini reading"></i>阅读中</span>
        <span><i class="mini pass"></i>简单pass</span>
        <span><i class="mini read"></i>正常读</span>
        <span><i class="mini important"></i>重要</span>
        <span>小圆点 = 已挂 GPT 对话 / share / transcript</span>
      </div>
    </div>
    <div class="empty">
      <p>这里保留当天的阅读进度和前沿变化，不在总览里替你判断具体论文。</p>
      ${b.frontier ? `<div class="frontier-note"><strong>前沿变化观察</strong><br>${b.frontier}</div>` : ''}
      <div class="status-blocks">
        <div>
          <div class="status-block-head">Read Now</div>
          <div class="cells" style="justify-content:flex-start;max-width:none;margin-top:8px;">${cellsFor(readNow)}</div>
        </div>
        <div>
          <div class="status-block-head">Watchlist bonus</div>
          <div class="cells" style="justify-content:flex-start;max-width:none;margin-top:8px;">${cellsFor(watchlist)}</div>
        </div>
      </div>
    </div>
  `;
}
function showTextModal(title, value, actions = []) {
  const modal = document.getElementById('modal');
  const text = document.getElementById('modalText');
  const actionsNode = document.getElementById('modalActions');
  document.getElementById('modalTitle').textContent = title;
  text.value = value;
  actionsNode.innerHTML = '';
  if (!actions.length) {
    actions = [{ label: '复制', run: value => navigator.clipboard.writeText(value).then(() => toast('已复制')) }];
  }
  actions.forEach(action => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'action-btn';
    btn.textContent = action.label;
    btn.addEventListener('click', async () => {
      const result = await action.run(text.value);
      if (result !== false) modal.classList.remove('show');
    });
    actionsNode.appendChild(btn);
  });
  modal.classList.add('show');
  text.focus();
}
document.getElementById('modalClose').addEventListener('click', () => document.getElementById('modal').classList.remove('show'));
document.getElementById('modal').addEventListener('click', event => {
  if (event.target.id === 'modal') event.currentTarget.classList.remove('show');
});
document.getElementById('search').addEventListener('input', renderList);
document.querySelectorAll('.seg button').forEach(btn => {
  btn.addEventListener('click', () => {
    filter = btn.dataset.filter;
    document.querySelectorAll('.seg button').forEach(item => item.classList.toggle('active', item === btn));
    renderList();
  });
});
render();
</script>
