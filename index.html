<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Research Briefings Console</title>
<style>
:root {
  color-scheme: light;
  --bg: #eef5f7;
  --panel: rgba(255, 255, 255, .88);
  --panel-2: rgba(247, 252, 253, .96);
  --ink: #12252b;
  --muted: #62777d;
  --line: rgba(37, 91, 102, .18);
  --line-strong: rgba(22, 110, 128, .38);
  --cyan: #0089a7;
  --blue: #3f7bd9;
  --amber: #d89a17;
  --skip: #8aa3ad;
  --queue: #4b83d1;
  --reading: #00a6a6;
  --pass: #d89a17;
  --read: #1c9a63;
  --important: #8f4fe8;
  --green: #1c9a63;
  --violet: #8f4fe8;
  --slate: #90a4ae;
  --topic-mon: #0089a7;
  --topic-tue: #7b61d1;
  --topic-wed: #1c9a63;
  --topic-thu: #d89a17;
  --topic-fri: #c4558b;
  --topic-sat: #4b83d1;
  --topic-sun: #90a4ae;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  min-height: 100vh;
  background:
    linear-gradient(rgba(0, 137, 167, .06) 1px, transparent 1px) 0 0 / 30px 30px,
    linear-gradient(90deg, rgba(0, 137, 167, .045) 1px, transparent 1px) 0 0 / 30px 30px,
    linear-gradient(180deg, #eef5f7 0%, #f8fbfc 42%, #ffffff 100%);
  color: var(--ink);
  font-family: "Bahnschrift", "DIN Condensed", "Microsoft YaHei", "PingFang SC", sans-serif;
}
body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background: linear-gradient(120deg, rgba(0,137,167,.12), transparent 34%, rgba(63,123,217,.1));
  mask-image: linear-gradient(180deg, rgba(255,255,255,.72), rgba(255,255,255,0));
}
button, input, textarea { font: inherit; }
button { color: inherit; }
a { color: inherit; }
.shell {
  width: 100%;
  max-width: none;
  margin: 0 auto;
  padding: clamp(18px, 2vw, 28px) clamp(16px, 2.2vw, 34px) 48px;
  position: relative;
}
.topbar {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 22px;
  align-items: end;
  padding: 18px 0 22px;
  border-bottom: 1px solid var(--line-strong);
}
.kicker { color: var(--cyan); font-size: 13px; letter-spacing: .08em; text-transform: uppercase; }
h1 { margin: 6px 0 0; font-size: clamp(34px, 6vw, 78px); line-height: .9; letter-spacing: 0; }
.hud { text-align: right; color: var(--muted); font-size: 13px; line-height: 1.65; }
.global-readout { color: var(--ink); font-size: 20px; font-variant-numeric: tabular-nums; }
.toolbar {
  display: grid;
  grid-template-columns: minmax(240px, 1fr) auto;
  gap: 12px;
  margin: 18px 0;
  align-items: center;
}
.timeline-panel {
  --timeline-h: clamp(520px, 34vw, 532px);
  border: 1px solid var(--line);
  border-radius: 8px;
  background: linear-gradient(180deg, rgba(255,255,255,.9), rgba(247,252,253,.74));
  padding: 12px;
  margin: 0 0 18px;
  box-shadow: 0 12px 32px rgba(31,72,84,.06);
}
.timeline-head {
  display: flex;
  align-items: start;
  justify-content: space-between;
  gap: 14px;
  margin-bottom: 10px;
}
.timeline-title { font-size: 18px; font-weight: 900; }
.timeline-subtitle { color: var(--muted); font-size: 12px; margin-top: 3px; }
.weekboard {
  display: grid;
  grid-template-columns: minmax(0, 1fr);
  grid-template-rows: repeat(6, minmax(0, 1fr));
  gap: 6px;
  margin: 0;
  height: 100%;
  min-height: 0;
  padding: 1px 0;
}
.week-card {
  --topic-color: var(--cyan);
  --seal-color: var(--topic-color);
  border: 1px solid var(--line);
  border-radius: 8px;
  background:
    linear-gradient(180deg, rgba(255,255,255,.94), rgba(247,252,253,.78));
  padding: 9px 12px;
  text-align: left;
  cursor: pointer;
  min-height: 0;
  height: 100%;
  max-height: 100%;
  display: grid;
  grid-template-columns: minmax(128px, auto) minmax(0, 1fr) auto minmax(84px, auto);
  grid-template-rows: 1fr;
  align-items: center;
  gap: 10px;
  position: relative;
  overflow: hidden;
  contain: layout size;
}
.week-card::before {
  content: "";
  position: absolute;
  inset: 0 auto 0 0;
  width: 4px;
  height: auto;
  background: var(--topic-color);
  opacity: .78;
}
.week-card:hover, .week-card.filtered { border-color: var(--topic-color); background: #f4fbfd; }
.week-card.filtered { box-shadow: 0 0 0 3px color-mix(in srgb, var(--topic-color) 18%, transparent); }
.week-card.today-topic {
  border-color: var(--topic-color);
  background:
    linear-gradient(180deg, color-mix(in srgb, var(--topic-color) 10%, #fff), rgba(255,255,255,.84));
  box-shadow: inset 0 3px 0 var(--topic-color), 0 0 0 3px color-mix(in srgb, var(--topic-color) 12%, transparent);
}
.week-card.active {
  border-color: var(--topic-color);
  box-shadow: 0 0 0 2px color-mix(in srgb, var(--topic-color) 28%, transparent);
}
.week-card.linked {
  outline: 2px dashed color-mix(in srgb, var(--topic-color) 64%, transparent);
  outline-offset: 2px;
}
.week-card.sealed {
  border-color: color-mix(in srgb, var(--seal-color) 62%, var(--line));
  background:
    linear-gradient(180deg, color-mix(in srgb, var(--seal-color) 12%, #fff), rgba(255,255,255,.88));
}
.week-card.complete {
  border-width: 2px;
  background:
    linear-gradient(180deg, color-mix(in srgb, var(--seal-color) 18%, #fff), rgba(255,255,255,.9));
  box-shadow: inset 0 0 0 1px rgba(255,255,255,.86), 0 14px 34px rgba(31,72,84,.08);
}
.week-card.empty { opacity: .72; }
.week-card-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  min-width: 0;
}
.week-date {
  color: var(--ink);
  font-size: 18px;
  font-weight: 950;
  font-variant-numeric: tabular-nums;
}
.week-day {
  color: var(--topic-color);
  font-size: clamp(12px, .9vw, 14px);
  font-weight: 950;
  line-height: 1.05;
  text-transform: uppercase;
  white-space: nowrap;
}
.week-topic {
  color: var(--ink);
  font-size: clamp(13px, .92vw, 15px);
  font-weight: 900;
  line-height: 1.12;
  min-height: 0;
  max-height: 36px;
  overflow: hidden;
  min-width: 0;
}
.week-state {
  color: var(--muted);
  font-size: 10px;
  font-weight: 900;
  letter-spacing: .04em;
  text-transform: uppercase;
  white-space: nowrap;
}
.week-card.sealed .week-state { color: var(--read); }
.week-card.complete .week-state { color: var(--important); }
.week-card.empty .week-state { color: var(--slate); }
.week-important-stars {
  display: flex;
  gap: 2px;
  min-height: 14px;
}
.week-important-stars span,
.task-star {
  color: var(--important);
  font-size: 13px;
  line-height: 1;
}
.week-fill-label {
  color: var(--muted);
  font-size: 10.5px;
  font-weight: 900;
  text-transform: uppercase;
}
.week-tasks {
  min-width: 0;
  display: grid;
  grid-template-columns: auto minmax(0, 1fr);
  gap: 3px 7px;
  align-items: center;
  width: max-content;
  max-width: 170px;
}
.week-tasks .week-fill-label {
  margin-top: 0 !important;
}
.week-read-cells,
.week-watch-dots {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  align-items: center;
}
.task-cell {
  width: 14px;
  height: 14px;
  border-radius: 4px;
  border: 1px solid rgba(18,37,43,.15);
  background: #eef5f7;
  position: relative;
}
.task-cell.open { background: rgba(255,255,255,.72); }
.task-cell.queue { background: repeating-linear-gradient(135deg, rgba(75,131,209,.12) 0 3px, rgba(75,131,209,.62) 3px 6px); border-color: var(--queue); }
.task-cell.reading { background: repeating-linear-gradient(135deg, rgba(0,166,166,.14) 0 3px, rgba(0,166,166,.7) 3px 6px); border-color: var(--reading); }
.task-cell.skip { background: var(--skip); }
.task-cell.pass { background: var(--pass); }
.task-cell.read { background: var(--read); }
.task-cell.important { background: var(--read); box-shadow: inset 0 0 0 2px rgba(143,79,232,.35); }
.task-cell.archived::after {
  content: "";
  position: absolute;
  right: -3px;
  bottom: -3px;
  width: 7px;
  height: 7px;
  border-radius: 999px;
  background: var(--important);
  border: 1px solid #fff;
  box-shadow: 0 0 0 1px rgba(143,79,232,.22), 0 0 8px rgba(143,79,232,.55);
}
.watch-dot {
  width: 7px;
  height: 7px;
  border-radius: 999px;
  border: 1px solid rgba(18,37,43,.14);
  background: #e9f1f3;
  position: relative;
}
.watch-dot.skip { background: var(--skip); }
.watch-dot.pass { background: var(--pass); }
.watch-dot.read { background: var(--read); }
.watch-dot.important { background: var(--important); }
.watch-dot.queue,
.watch-dot.reading { background: #b9dfe2; border-style: dashed; }
.watch-dot.archived {
  box-shadow: 0 0 0 2px rgba(255,255,255,.9), 0 0 0 4px rgba(143,79,232,.34);
}
.week-empty-mark {
  align-self: center;
  justify-self: center;
  color: var(--muted);
  font-size: 12px;
  font-weight: 900;
  overflow: hidden;
}
.week-progress-text {
  display: grid;
  gap: 2px;
  color: var(--muted);
  font-size: 12px;
  font-weight: 900;
}
.week-progress-text b { color: var(--ink); }
.week-card-footer {
  border-top: 0;
  border-left: 1px solid rgba(37,91,102,.12);
  padding-top: 0;
  padding-left: 9px;
  min-width: 0;
  width: max-content;
}
.timeline-body {
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(540px, 36%);
  gap: 12px;
  align-items: stretch;
  height: var(--timeline-h);
  min-height: 0;
  overflow: hidden;
}
.timeline-calendar-column {
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 12px;
  height: var(--timeline-h);
  min-height: 0;
}
.timeline-calendar-column .weekboard {
  flex: 1 1 auto;
}
.timeline-side-column {
  display: grid;
  grid-template-rows: auto minmax(0, 1fr);
  gap: 8px;
  min-width: 0;
  height: var(--timeline-h);
  min-height: 0;
  overflow: hidden;
  padding-right: 3px;
}
.calendar-panel {
  padding: 10px;
  margin: 0;
  flex: 0 0 auto;
  height: auto;
  min-height: 0;
  overflow: hidden;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: rgba(255,255,255,.62);
}
.month-map-head {
  display: flex;
  align-items: start;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 8px;
}
.month-map-title {
  color: var(--ink);
  font-size: 14px;
  font-weight: 950;
}
.month-map-subtitle {
  color: var(--muted);
  font-size: 10px;
  margin-top: 2px;
  display: none;
}
.month-map-label {
  color: var(--ink);
  font-size: 11px;
  font-weight: 950;
  white-space: nowrap;
}
.calendar-tools {
  display: flex;
  gap: 7px;
  align-items: center;
  flex-wrap: wrap;
  justify-content: flex-end;
}
.calendar-month-label {
  min-width: 92px;
  text-align: center;
  color: var(--ink);
  font-weight: 900;
}
.calendar-title {
  font-size: 18px;
  font-weight: 900;
  letter-spacing: 0;
}
.calendar-toggle {
  border: 1px solid var(--line-strong);
  background: #fff;
  border-radius: 7px;
  padding: 8px 11px;
  font-weight: 800;
  cursor: pointer;
  white-space: nowrap;
}
.calendar-nav {
  width: 34px;
  min-height: 34px;
  border: 1px solid var(--line);
  border-radius: 7px;
  background: #fff;
  cursor: pointer;
  font-weight: 900;
}
.calendar-strip {
  display: grid;
  grid-template-columns: repeat(7, minmax(0, 1fr));
  grid-template-rows: 18px repeat(5, 44px);
  gap: 7px;
  padding: 0;
  align-items: start;
  overflow: hidden;
}
.task-map-head {
  height: 18px;
  display: grid;
  place-items: center;
  color: var(--muted);
  font-size: 10px;
  font-weight: 950;
  text-transform: uppercase;
}
.task-map-cell {
  --topic-color: var(--cyan);
  height: 44px;
  border: 1px solid rgba(37,91,102,.13);
  border-radius: 6px;
  background: rgba(255,255,255,.68);
  padding: 6px 7px;
  display: grid;
  grid-template-columns: 28px minmax(0, 1fr);
  grid-template-rows: 1fr;
  align-items: center;
  gap: 5px;
  color: var(--ink);
  font-size: 12px;
  font-weight: 900;
  cursor: pointer;
  position: relative;
  overflow: hidden;
}
.task-map-cell.outside { opacity: .42; }
.task-map-cell.task-none {
  color: var(--muted);
  background: rgba(250,253,254,.5);
  cursor: default;
}
.task-map-cell.task-open { background: #fff; }
.task-map-cell.task-progress {
  border-color: rgba(0,137,167,.3);
  background: #eefbfd;
}
.task-map-cell.task-sealed {
  border-color: rgba(28,154,99,.34);
  background: #eaf8f0;
}
.task-map-cell.task-complete {
  border-color: rgba(143,79,232,.38);
  background: #efeaff;
}
.task-map-cell.today,
.task-map-cell.active {
  border-color: var(--topic-color);
  box-shadow: 0 0 0 2px color-mix(in srgb, var(--topic-color) 17%, transparent);
}
.task-map-date { font-variant-numeric: tabular-nums; grid-column: 1; grid-row: 1; }
.task-map-stars { display: none; }
.task-map-symbol {
  display: none;
  width: 9px;
  height: 9px;
  border-radius: 3px;
  border: 1px solid rgba(18,37,43,.18);
  background: #fff;
  flex: 0 0 auto;
  grid-column: 3;
  grid-row: 2;
  justify-self: end;
}
.task-map-level {
  grid-column: 2;
  grid-row: 1;
  justify-self: end;
}
.task-map-level.calendar-badge {
  width: 22px;
  height: 22px;
  flex-basis: 22px;
}
.task-map-level.calendar-badge span {
  width: 11px;
  height: 11px;
}
.task-progress .task-map-symbol {
  border-color: var(--cyan);
  background: repeating-linear-gradient(135deg, rgba(0,137,167,.09) 0 3px, rgba(0,137,167,.42) 3px 6px);
}
.task-sealed .task-map-symbol {
  border-color: var(--read);
  background: var(--read);
}
.task-complete .task-map-symbol {
  border-color: var(--important);
  background: var(--important);
  transform: rotate(45deg);
}
.calendar-day {
  --topic-color: var(--cyan);
  --day-bg: #ffffff;
  --day-border: var(--line);
  min-width: 0;
  min-height: 46px;
  border: 1px solid var(--day-border);
  border-radius: 6px;
  background: var(--day-bg);
  padding: 6px;
  text-align: left;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.calendar-day.month-head {
  min-height: 16px;
  height: 16px;
  justify-content: center;
  border: 0;
  background: transparent;
  color: var(--muted);
  cursor: default;
  text-align: center;
  font-size: 9px;
  font-weight: 950;
  text-transform: uppercase;
}
.calendar-panel .calendar-day:not(.month-head) {
  min-height: 24px;
  height: 24px;
  max-height: 24px;
  align-self: start;
}
.calendar-day.outside { opacity: .46; }
.calendar-day.month-visible {
  opacity: 1;
}
.calendar-day.month-visible .calendar-date {
  font-weight: 950;
}
.calendar-day.empty {
  cursor: default;
  color: var(--muted);
  background: var(--day-bg);
}
.calendar-day.weekday { --day-bg: #ffffff; --day-border: rgba(37,91,102,.18); }
.calendar-day.weekend,
.calendar-day.holiday { --day-bg: #eaf8ef; --day-border: rgba(28,154,99,.24); }
.calendar-day.workday {
  --day-bg: #fff0d8;
  --day-border: rgba(216,154,23,.64);
}
.calendar-day.task-none {
  --day-bg: rgba(250,253,254,.62);
  --day-border: rgba(37,91,102,.11);
  cursor: default;
}
.calendar-day.task-open { --day-bg: #fff; }
.calendar-day.task-progress {
  --day-bg: #eefbfd;
  --day-border: rgba(0,137,167,.32);
}
.calendar-day.task-sealed {
  --day-bg: #eaf8f0;
  --day-border: rgba(28,154,99,.35);
}
.calendar-day.task-complete {
  --day-bg: #efeaff;
  --day-border: rgba(143,79,232,.38);
}
.calendar-day.today {
  border-color: var(--topic-color);
  box-shadow:
    inset 0 0 0 2px color-mix(in srgb, var(--topic-color) 45%, transparent),
    0 0 0 3px color-mix(in srgb, var(--topic-color) 14%, transparent);
}
.calendar-day.today::after {
  content: "TODAY";
  position: absolute;
  right: 6px;
  bottom: 5px;
  color: var(--topic-color);
  font-size: 8px;
  font-weight: 900;
  letter-spacing: .06em;
  z-index: 0;
  opacity: .82;
}
.calendar-day.linked {
  outline: 2px dashed color-mix(in srgb, var(--topic-color) 64%, transparent);
  outline-offset: 2px;
}
.calendar-panel.collapsed .calendar-day {
  min-height: 42px;
  padding: 4px;
  gap: 3px;
}
.calendar-day:hover, .calendar-day.active {
  border-color: var(--topic-color);
  background: color-mix(in srgb, var(--day-bg) 88%, var(--topic-color) 12%);
}
.calendar-day > * { position: relative; z-index: 1; }
.calendar-date {
  width: 100%;
  display: flex;
  justify-content: space-between;
  gap: 3px;
  color: var(--ink);
  font-size: 9px;
  font-weight: 900;
  font-variant-numeric: tabular-nums;
}
.calendar-date small { color: var(--muted); font-size: 10px; font-weight: 800; }
.calendar-badge {
  width: 16px;
  height: 16px;
  flex: 0 0 16px;
  box-sizing: border-box;
  border-radius: 999px;
  display: grid;
  place-items: center;
  font-size: 10px;
  line-height: 1;
  font-weight: 900;
  background: #fff;
  border: 2px solid currentColor;
  box-shadow: 0 0 0 2px color-mix(in srgb, currentColor 8%, transparent);
}
.calendar-badge span {
  display: block;
  line-height: 1;
  width: 8px;
  height: 8px;
  position: relative;
}
.calendar-panel.collapsed .calendar-badge {
  width: 16px;
  height: 16px;
  font-size: 9px;
}
.calendar-badge.lv0 {
  color: #90a4ae;
  background: linear-gradient(180deg, #ffffff, #edf5f7);
  border-style: dashed;
}
.calendar-badge.lv1 {
  background: linear-gradient(180deg, #ffffff, #eef5ff);
}
.calendar-badge.lv1 span::before {
  content: "";
  position: absolute;
  inset: 2px;
  border-radius: 999px;
  background: currentColor;
}
.calendar-badge.lv2 {
  background: radial-gradient(circle at 50% 50%, color-mix(in srgb, currentColor 14%, #fff) 0 34%, #fff 36% 100%);
}
.calendar-badge.lv2 span::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 999px;
  background: linear-gradient(90deg, transparent 0 44%, currentColor 45% 100%);
}
.calendar-badge.lv3 {
  background: radial-gradient(circle at 50% 50%, currentColor 0 32%, #fff 34% 100%);
  color: #1c9a63;
}
.calendar-badge.lv3 span::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 999px;
  background: currentColor;
}
.calendar-badge.lv4 {
  color: #6b63ff;
  border-width: 2px;
  background:
    radial-gradient(circle at 50% 48%, #fff 0 32%, rgba(107,99,255,.18) 34% 100%),
    linear-gradient(135deg, rgba(107,99,255,.26), rgba(216,154,23,.18));
  box-shadow: 0 0 0 2px rgba(107,99,255,.12), 0 0 10px rgba(107,99,255,.2);
}
.calendar-badge.lv4 span::before {
  content: "";
  position: absolute;
  inset: 1px;
  border-radius: 2px;
  background: currentColor;
  transform: rotate(45deg);
}
.calendar-badge.lv5 {
  color: #8f4fe8;
  border-width: 2px;
  background:
    radial-gradient(circle at 50% 45%, #fff 0 32%, rgba(216,154,23,.2) 33% 48%, rgba(143,79,232,.18) 50% 100%),
    linear-gradient(135deg, rgba(143,79,232,.24), rgba(0,166,166,.16));
  box-shadow: 0 0 0 2px rgba(143,79,232,.16), 0 0 14px rgba(143,79,232,.36), 0 0 8px rgba(216,154,23,.22) inset;
  transform: rotate(45deg);
}
.calendar-badge.lv5 span { transform: rotate(-45deg); }
.calendar-badge.lv5 span::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 2px;
  background: currentColor;
  transform: rotate(45deg);
  box-shadow: 0 0 0 2px rgba(216,154,23,.2);
}
.calendar-level {
  color: var(--muted);
  font-size: 9px;
  line-height: 16px;
  font-weight: 900;
  text-transform: uppercase;
}
.calendar-status-row {
  display: flex;
  align-items: center;
  gap: 4px;
  margin-top: 1px;
}
.calendar-main,
.calendar-bonus-row {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 6px;
  color: var(--muted);
  font-size: 11px;
  font-weight: 800;
}
.calendar-main b,
.calendar-bonus-row b { color: var(--ink); }
.calendar-read-dots {
  display: block;
  width: 100%;
  height: 2px;
  border-radius: 999px;
  background: linear-gradient(90deg, var(--topic-color) var(--day-fill, 0%), #dce9ec 0);
  margin-top: auto;
}
.calendar-bonus,
.calendar-read-dots span {
  display: none;
}
.calendar-important-stars {
  position: static;
  display: flex;
  gap: 2px;
  align-items: center;
  margin-left: auto;
  flex: 0 0 auto;
}
.calendar-important-stars span {
  width: 8px;
  height: 8px;
  background: var(--important);
  clip-path: polygon(50% 0, 61% 35%, 98% 35%, 68% 57%, 79% 92%, 50% 70%, 21% 92%, 32% 57%, 2% 35%, 39% 35%);
}
.calendar-important-stars b {
  color: var(--important);
  font-size: 9px;
  line-height: 1;
}
.calendar-tag {
  display: none;
}
.calendar-empty-mark {
  color: #90a4ae;
  font-size: 8px;
  font-weight: 900;
  grid-column: 2;
  grid-row: 1 / 3;
  justify-self: end;
}
.calendar-task-symbol {
  margin-top: auto;
  display: flex;
  align-items: center;
  gap: 2px;
  color: var(--muted);
  font-size: 11px;
  font-weight: 950;
}
.task-symbol {
  display: inline-grid;
  place-items: center;
  width: 9px;
  height: 9px;
  border-radius: 3px;
  border: 1px solid rgba(18,37,43,.18);
  background: #fff;
}
.task-progress .task-symbol {
  border-color: var(--cyan);
  background: repeating-linear-gradient(135deg, rgba(0,137,167,.09) 0 3px, rgba(0,137,167,.42) 3px 6px);
}
.task-sealed .task-symbol {
  border-color: var(--read);
  background: var(--read);
}
.task-complete .task-symbol {
  border-color: var(--important);
  background: var(--important);
  transform: rotate(45deg);
}
.calendar-day.active .task-symbol,
.calendar-day.today .task-symbol {
  box-shadow: 0 0 0 2px rgba(255,255,255,.9), 0 0 0 4px color-mix(in srgb, var(--topic-color) 25%, transparent);
}
.contrib-panel {
  margin-top: 0;
  border-top: 1px solid var(--line);
  border-left: 0;
  padding: 6px 0 0;
  height: 100%;
  display: flex;
  flex-direction: column;
  min-height: 0;
  overflow: hidden;
}
.contrib-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  margin-bottom: 8px;
}
.contrib-title { font-size: 15px; font-weight: 900; }
.contrib-subtitle {
  color: var(--muted);
  display: block;
  font-size: 10px;
  font-weight: 900;
  white-space: nowrap;
}
.contrib-map {
  display: grid;
  grid-template-columns: 27px minmax(0, 1fr);
  grid-template-rows: auto;
  column-gap: 6px;
  flex: 1 1 auto;
  min-height: 0;
  overflow: hidden;
}
.contrib-scroll {
  grid-column: 2;
  grid-row: 1;
  overflow-x: auto;
  overflow-y: hidden;
  padding: 0 1px 4px;
  scrollbar-width: thin;
  max-width: 100%;
  min-height: 0;
}
.contrib-month-axis {
  display: grid;
  color: var(--muted);
  font-size: 9px;
  font-weight: 900;
  line-height: 12px;
  margin-bottom: 4px;
}
.contrib-month-axis span {
  white-space: nowrap;
  overflow: hidden;
  text-overflow: clip;
}
.contrib-weekdays {
  grid-column: 1;
  grid-row: 1;
  display: grid;
  grid-template-rows: repeat(7, 14px);
  gap: 3px;
  padding-top: 32px;
  color: var(--muted);
  font-size: 8px;
  font-weight: 900;
  line-height: 14px;
  text-transform: uppercase;
}
.contrib-grid {
  display: grid;
  grid-auto-flow: column;
  grid-template-rows: repeat(7, 14px);
  grid-auto-columns: 14px;
  gap: 3px;
  overflow: visible;
  padding: 0;
  align-items: center;
  justify-content: start;
}
.contrib-day {
  width: 14px;
  height: 14px;
  min-height: 0;
  border: 1px solid rgba(18,37,43,.08);
  border-radius: 3px;
  background: var(--heat);
  cursor: pointer;
  position: relative;
}
.contrib-day.active {
  border-color: var(--cyan);
  box-shadow: 0 0 0 3px rgba(0,137,167,.14);
}
.contrib-day span {
  display: none;
}
.contrib-detail {
  display: none;
}
.contrib-kpis {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 7px;
}
.contrib-kpi {
  border: 1px solid var(--line);
  border-radius: 7px;
  padding: 6px 7px;
  background: #fff;
  color: var(--muted);
  font-size: 11px;
  font-weight: 800;
}
.contrib-kpi b { display: block; color: var(--ink); font-size: 16px; }
.contrib-list {
  display: grid;
  gap: 6px;
  max-height: none;
  overflow: auto;
  min-height: 0;
}
.contrib-item {
  display: grid;
  grid-template-columns: 42px minmax(0, 1fr) auto;
  gap: 6px;
  align-items: center;
  border: 1px solid var(--line);
  border-radius: 7px;
  background: #fff;
  padding: 6px 7px;
  font-size: 11px;
}
.contrib-item .source { color: var(--cyan); font-weight: 900; }
.contrib-item .paper { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.contrib-item .decision {
  justify-self: end;
  border-radius: 999px;
  padding: 2px 6px;
  background: color-mix(in srgb, var(--decision-color) 16%, #fff);
  color: var(--decision-color);
  font-weight: 900;
  white-space: nowrap;
}
.topic-rail {
  width: 7px;
  align-self: stretch;
  border-radius: 999px;
  background: var(--topic-color);
}
.search, .textarea-input {
  width: 100%;
  border: 1px solid var(--line);
  background: rgba(255, 255, 255, .86);
  color: var(--ink);
  border-radius: 6px;
  padding: 11px 13px;
  outline: none;
}
.search:focus, .textarea-input:focus { border-color: var(--cyan); box-shadow: 0 0 0 3px rgba(0,137,167,.12); }
.seg { display: inline-flex; border: 1px solid var(--line); border-radius: 6px; overflow: hidden; background: rgba(255,255,255,.76); }
.seg button, .ghost-btn, .action-btn, .mode-btn {
  border: 0;
  background: transparent;
  cursor: pointer;
  white-space: nowrap;
}
.seg button { padding: 10px 13px; color: var(--muted); }
.seg button.active { background: var(--cyan); color: #fff; }
.layout { display: grid; grid-template-columns: minmax(420px, 1fr) minmax(460px, 620px); gap: 18px; align-items: start; }
.overview {
  display: grid;
  gap: 10px;
}
.briefing-row {
  --topic-color: var(--cyan);
  width: 100%;
  display: grid;
  grid-template-columns: 7px 92px 112px minmax(160px, 1fr) auto;
  gap: 14px;
  align-items: center;
  border: 1px solid var(--line);
  background: linear-gradient(90deg, rgba(255, 255, 255, .96), rgba(241, 249, 252, .86));
  border-radius: 7px;
  padding: 12px;
  text-align: left;
  cursor: pointer;
  transition: border-color .16s ease, transform .16s ease, background .16s ease;
}
.briefing-row:hover, .briefing-row.active {
  border-color: var(--cyan);
  transform: translateY(-1px);
  background: linear-gradient(90deg, rgba(246, 253, 255, .98), rgba(232, 246, 251, .9));
}
.date { color: var(--topic-color); font-variant-numeric: tabular-nums; font-weight: 700; }
.topic { min-width: 0; }
.topic-name { font-weight: 700; line-height: 1.3; }
.topic-kicker { color: var(--muted); font-size: 13px; margin-top: 6px; line-height: 1.35; }
.row-sub { color: var(--muted); font-size: 12px; margin-top: 5px; }
.level-badge {
  display: grid;
  justify-items: center;
  gap: 4px;
}
.level-ring {
  width: calc(64px + var(--level-boost, 0px));
  height: calc(64px + var(--level-boost, 0px));
  border-radius: 999px;
  display: grid;
  place-items: center;
  background:
    conic-gradient(var(--level-color) calc(var(--pct) * 1%), #dbe8eb 0);
  box-shadow: inset 0 0 0 1px rgba(18,37,43,.08);
}
.level-ring::before {
  content: "";
  position: absolute;
}
.level-inner {
  width: calc(48px + var(--level-boost, 0px) * .65);
  height: calc(48px + var(--level-boost, 0px) * .65);
  border-radius: 999px;
  display: grid;
  place-items: center;
  background: #fff;
  color: var(--level-color);
  font-weight: 900;
  font-size: 22px;
}
.level-name { font-size: 12px; color: var(--muted); font-weight: 800; }
.bonus-dots {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 3px;
  max-width: 92px;
}
.bonus-dot {
  width: 7px;
  height: 7px;
  border-radius: 999px;
  background: var(--dot-color, var(--important));
  box-shadow: 0 0 0 1px rgba(255,255,255,.9), 0 0 8px color-mix(in srgb, var(--dot-color, var(--important)) 38%, transparent);
}
.stat-grid {
  display: grid;
  grid-template-columns: repeat(4, auto);
  gap: 8px 12px;
  color: var(--muted);
  font-size: 12px;
  margin-top: 8px;
}
.stat-grid b { color: var(--ink); font-variant-numeric: tabular-nums; }
.match-list {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin-top: 7px;
}
.match-chip {
  max-width: 100%;
  border: 1px solid color-mix(in srgb, var(--topic-color) 30%, transparent);
  border-radius: 999px;
  background: color-mix(in srgb, var(--topic-color) 8%, white);
  color: var(--ink);
  padding: 3px 7px;
  font-size: 11px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.cells { display: flex; gap: 5px; flex-wrap: wrap; justify-content: flex-end; max-width: 360px; }
.cell {
  width: 18px;
  height: 18px;
  border-radius: 3px;
  border: 1px solid rgba(18,37,43,.14);
  background: rgba(255,255,255,.76);
  position: relative;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,.58);
}
.cell.queue {
  background: repeating-linear-gradient(135deg, rgba(75,131,209,.18) 0 4px, rgba(75,131,209,.62) 4px 8px);
  border-color: var(--queue);
}
.cell.reading {
  background: repeating-linear-gradient(135deg, rgba(0,166,166,.2) 0 4px, rgba(0,166,166,.68) 4px 8px);
  border-color: var(--reading);
}
.cell.skip { background: var(--skip); }
.cell.pass { background: var(--pass); }
.cell.read { background: var(--read); }
.cell.important { background: var(--important); }
.cell.skim { background: var(--amber); }
.cell.deep { background: var(--green); }
.cell.open { background: rgba(255,255,255,.76); }
.cell.open::after {
  content: "?";
  position: absolute;
  inset: 0;
  display: grid;
  place-items: center;
  color: var(--slate);
  font-size: 11px;
  font-weight: 900;
}
.cell.star::before {
  content: "";
  position: absolute;
  inset: 3px;
  border-radius: 99px;
  border: 1px solid rgba(255,255,255,.82);
}
.cell.convo::after {
  content: "";
  position: absolute;
  right: -3px;
  bottom: -3px;
  width: 7px;
  height: 7px;
  border-radius: 99px;
  background: var(--violet);
  box-shadow: 0 0 12px var(--violet);
}
.detail {
  position: sticky;
  top: 16px;
  border: 1px solid var(--line-strong);
  background: linear-gradient(180deg, rgba(255, 255, 255, .97), rgba(242, 249, 252, .98));
  border-radius: 7px;
  min-height: 600px;
  overflow: hidden;
}
.detail-head { padding: 18px; border-bottom: 1px solid var(--line); }
.detail-top { display: flex; gap: 12px; justify-content: space-between; align-items: start; }
.detail h2 { margin: 0; font-size: clamp(24px, 3vw, 42px); line-height: 1; letter-spacing: 0; }
.summary { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; color: var(--muted); font-size: 12px; }
.pill { border: 1px solid var(--line); border-radius: 999px; padding: 5px 9px; background: rgba(255,255,255,.72); }
.open-original, .ghost-btn, .action-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 34px;
  border: 1px solid var(--line-strong);
  border-radius: 6px;
  padding: 8px 10px;
  text-decoration: none;
  color: var(--ink);
  background: rgba(255,255,255,.78);
}
.open-original:hover, .ghost-btn:hover, .action-btn:hover { border-color: var(--cyan); color: var(--cyan); }
.legend { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; color: var(--muted); font-size: 12px; }
.legend span { display: inline-flex; align-items: center; gap: 6px; }
.mini { width: 11px; height: 11px; border-radius: 3px; border: 1px solid rgba(18,37,43,.16); display: inline-block; }
.mini.open { background: rgba(255,255,255,.78); }
.mini.queue { background: repeating-linear-gradient(135deg, rgba(75,131,209,.18) 0 3px, rgba(75,131,209,.62) 3px 6px); border-color: var(--queue); }
.mini.reading { background: repeating-linear-gradient(135deg, rgba(0,166,166,.2) 0 3px, rgba(0,166,166,.68) 3px 6px); border-color: var(--reading); }
.mini.skip { background: var(--skip); }
.mini.pass { background: var(--pass); }
.mini.read { background: var(--read); }
.mini.important { background: var(--important); }
.status-blocks { display: grid; gap: 10px; margin-top: 16px; }
.status-block-head { color: var(--muted); font-size: 12px; font-weight: 800; text-transform: uppercase; }
.frontier-note {
  margin-top: 16px;
  border-left: 3px solid var(--cyan);
  padding-left: 12px;
  color: var(--ink);
  line-height: 1.5;
}
.mini.skim { background: var(--amber); }
.mini.deep { background: var(--green); }
.paper-list { list-style: none; padding: 0; margin: 0; }
.section-title {
  position: sticky;
  top: 0;
  z-index: 1;
  padding: 10px 18px;
  border-bottom: 1px solid var(--line);
  border-top: 1px solid var(--line);
  background: rgba(246, 253, 255, .95);
  color: var(--cyan);
  font-size: 12px;
  letter-spacing: .08em;
  text-transform: uppercase;
}
.modes { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
.mode-btn {
  min-height: 30px;
  border: 1px solid var(--line);
  border-radius: 6px;
  padding: 6px 9px;
  color: var(--muted);
  background: rgba(255,255,255,.025);
}
.mode-btn.active, .mode-btn:hover { color: #fff; background: var(--cyan); border-color: var(--cyan); }
.mode-btn.skip.active, .mode-btn.skip:hover { background: var(--red); border-color: var(--red); color: #fff; }
.mode-btn.star.active { background: transparent; color: var(--violet); border-color: var(--violet); box-shadow: inset 0 0 18px rgba(185,147,255,.12); }
.paper-actions { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 10px; }
.action-btn { min-height: 31px; font-size: 12px; }
.convo-line {
  margin-top: 9px;
  color: var(--muted);
  font-size: 12px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
}
.convo-link { color: var(--violet); text-decoration: none; }
.convo-link:hover { text-decoration: underline; }
.empty { padding: 34px 18px; color: var(--muted); }
.toast {
  position: fixed;
  left: 50%;
  bottom: 22px;
  transform: translateX(-50%);
  background: rgba(255,255,255,.96);
  border: 1px solid var(--cyan);
  color: var(--ink);
  border-radius: 7px;
  padding: 10px 14px;
  box-shadow: 0 16px 44px rgba(31,72,84,.18);
  opacity: 0;
  pointer-events: none;
  transition: opacity .18s ease;
}
.toast.show { opacity: 1; }
.modal {
  position: fixed;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  background: rgba(18,37,43,.28);
  z-index: 10;
  padding: 20px;
}
.modal.show { display: flex; }
.modal-panel {
  width: min(720px, 100%);
  border: 1px solid var(--line-strong);
  border-radius: 7px;
  background: var(--panel-2);
  padding: 18px;
  box-shadow: 0 30px 80px rgba(31,72,84,.22);
}
.modal-head { display: flex; justify-content: space-between; gap: 12px; align-items: center; margin-bottom: 12px; }
.modal-title { font-size: 18px; font-weight: 700; }
.textarea-input { min-height: 110px; resize: vertical; }
.modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 12px; }
@media (max-width: 980px) {
  .toolbar, .layout, .topbar { grid-template-columns: 1fr; }
  .weekboard { display: flex; overflow-x: auto; padding-bottom: 4px; scroll-snap-type: x proximity; }
  .week-card { min-width: 148px; min-height: 170px; scroll-snap-align: start; }
  .timeline-body { grid-template-columns: 1fr; height: auto; }
  .timeline-calendar-column { height: auto; }
  .timeline-side-column { gap: 10px; height: auto; overflow: visible; }
  .calendar-strip { gap: 5px; }
  .calendar-day { min-height: 42px; padding: 6px; }
  .calendar-panel, .contrib-panel { height: auto; }
  .contrib-grid { grid-template-rows: repeat(7, 12px); }
  .contrib-panel { border-left: 0; border-top: 1px solid var(--line); padding: 10px 0 0; }
  .timeline-head { align-items: stretch; flex-direction: column; }
  .calendar-tools { justify-content: flex-start; }
  .contrib-detail { grid-template-columns: 1fr; }
  .hud { text-align: left; }
  .detail { position: static; }
  .briefing-row { grid-template-columns: 7px 72px 90px minmax(0, 1fr); }
  .cells { grid-column: 1 / -1; justify-content: flex-start; }
}
</style>
</head>
<body>
<main class="shell">
  <header class="topbar">
    <div>
      <div class="kicker">paper triage console</div>
      <h1>Research<br>Briefings</h1>
    </div>
    <div class="hud">
      <div>Generated 2026-05-17 22:32</div>
      <div class="global-readout" id="globalStats"></div>
      <div id="activeProject"></div>
    </div>
  </header>
  <section class="toolbar" aria-label="filters">
    <input id="search" class="search" placeholder="搜索日期、主题、论文标题或状态">
    <div class="seg" role="group" aria-label="status filter">
      <button type="button" data-filter="all" class="active">全部</button>
      <button type="button" data-filter="pending">未完成</button>
      <button type="button" data-filter="filed">已归档</button>
      <button type="button" data-filter="important">重要</button>
    </div>
  </section>

  <section class="timeline-panel" aria-label="reading timeline">
    <div class="timeline-head">
      <div>
        <div class="timeline-title">Reading Week</div>
        <div class="timeline-subtitle">Week Rail 展示本周 briefing 任务；Month Task Map 只标记 Read Now 是否清完。</div>
      </div>
      <div class="calendar-tools">
        <button type="button" id="calendarPrev" class="calendar-nav">‹</button>
        <div id="calendarMonthLabel" class="calendar-month-label"></div>
        <button type="button" id="calendarNext" class="calendar-nav">›</button>
        <button type="button" id="calendarToggle" class="calendar-toggle">今天</button>
      </div>
    </div>
    <div class="timeline-body">
      <div class="timeline-calendar-column">
        <section id="weekBoard" class="weekboard" aria-label="weekly reading rail"></section>
      </div>
      <div class="timeline-side-column">
        <section id="calendarPanel" class="calendar-panel" aria-label="month task map">
          <div class="month-map-head">
            <div>
              <div class="month-map-title">Month Task Map</div>
              <div class="month-map-subtitle">只展示 briefing 任务完成情况</div>
            </div>
            <div id="monthTaskLabel" class="month-map-label"></div>
          </div>
          <section id="calendarStrip" class="calendar-strip" aria-label="month task completion map"></section>
        </section>
        <section id="contribPanel" class="contrib-panel" aria-label="reading contribution graph">
          <div class="contrib-head">
            <div class="contrib-title">Reading Activity</div>
            <div class="contrib-subtitle" id="contribSummary"></div>
          </div>
          <div class="contrib-map">
            <div class="contrib-weekdays" aria-hidden="true"><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span><span>Sun</span></div>
            <div class="contrib-scroll">
              <div id="contribMonthAxis" class="contrib-month-axis"></div>
              <div id="contribGrid" class="contrib-grid"></div>
            </div>
          </div>
          <div id="contribDetail" class="contrib-detail"></div>
        </section>
      </div>
    </div>
  </section>
  <section class="layout">
    <div id="briefingList" class="overview"></div>
    <article id="detail" class="detail"></article>
  </section>
</main>
<div id="toast" class="toast"></div>
<div id="modal" class="modal" role="dialog" aria-modal="true">
  <div class="modal-panel">
    <div class="modal-head">
      <div class="modal-title" id="modalTitle"></div>

function sourceLinksForContribution(dayKey) {

function contributionRecords() {

    const state = readState(paper);
    const decisionEvents = (state.events || [])
      .filter(event => event.type === 'decision' && isFiled(event.to))
      .map(event => ({ day: dateKey(new Date(event.at)), decision: event.to, eventType: 'decision' }));
    if (!decisionEvents.length && isFiled(state.decision) && state.updatedAt) {
      decisionEvents.push({ day: dateKey(new Date(state.updatedAt)), decision: state.decision, eventType: 'fallback' });

function contributionHeat(count) {

function contributionMonthLabels(days) {

  const weeks = Math.ceil(days.length / 7);
  const starts = [];
  days.forEach((day, index) => {
    if (day.endsWith('-01') || index === 0) {
      const date = parseDateKey(day);
      starts.push({ week: Math.floor(index / 7) + 1, label: monthNames[date.getMonth()] });
    }

  return starts.map((item, index) => {

  }).join('');
}
function contributionRange() {

}

function importantStars(count, className = 'week-important-stars') {
  if (!count) return `<div class="${className}" aria-hidden="true"></div>`;
  const stars = Array.from({ length: Math.min(count, 4) }, () => '<span>★</span>').join('');
  const extra = count > 4 ? `<span>+${count - 4}</span>` : '';

function taskStatusFor(briefing) {
  if (!briefing) return { key: 'none', label: 'no briefing', symbol: '·' };
  const stats = paperStats(briefing);
  if (!stats.readNow.total) return { key: 'none', label: 'no main', symbol: '·' };
  if (stats.readNow.done === stats.readNow.total) {
    if (stats.watch.total && stats.watch.done === stats.watch.total) return { key: 'complete', label: 'complete', symbol: '◆' };
    return { key: 'sealed', label: 'sealed', symbol: '●' };
  }
  if (stats.readNow.started > 0 || stats.readNow.done > 0) return { key: 'progress', label: 'in progress', symbol: '◌' };
  return { key: 'open', label: 'open', symbol: '□' };
}
function rowMatches(briefing, query) {
  if (!query) return true;

    briefing.date,
    briefing.topic,
    briefing.title,
    briefing.kicker,
    ...briefing.papers.map(p => `${p.title} ${readState(p).decision} ${readState(p).conversationUrl ? 'conversation' : ''}`)

function updateCalendarMonthFromScroll() {
  const panel = document.getElementById('calendarPanel');
  const label = document.getElementById('calendarMonthLabel');
  if (!panel || !label) return;
  const days = [...panel.querySelectorAll('.calendar-day')];
  const panelBox = panel.getBoundingClientRect();
  const visibleMonths = days.reduce((acc, day) => {
    const box = day.getBoundingClientRect();
    const overlap = Math.max(0, Math.min(box.bottom, panelBox.bottom) - Math.max(box.top, panelBox.top));
    if (overlap > 0) acc[day.dataset.month] = (acc[day.dataset.month] || 0) + overlap;
    return acc;
  }, {});
  const visibleMonth = Object.entries(visibleMonths).sort((a, b) => b[1] - a[1])[0]?.[0];
  if (!visibleMonth) return;
  calendarMonth = visibleMonth;
  label.textContent = visibleMonth.replace('-', ' / ');
  days.forEach(day => day.classList.toggle('month-visible', day.dataset.month === visibleMonth));
}

function showTextModal(title, value, actions = []) {
  const modal = document.getElementById('modal');
  const text = document.getElementById('modalText');
  const actionsNode = document.getElementById('modalActions');
  document.getElementById('modalTitle').textContent = title;
  text.value = value;
  actionsNode.innerHTML = '';
  if (!actions.length) {
    actions = [{ label: '复制', run: value => navigator.clipboard.writeText(value).then(() => toast('已复制')) }];
  }
  actions.forEach(action => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'action-btn';
    btn.textContent = action.label;
    btn.addEventListener('click', async () => {
      const result = await action.run(text.value);
      if (result !== false) modal.classList.remove('show');
    });
    actionsNode.appendChild(btn);
  });
  modal.classList.add('show');
  text.focus();
}
